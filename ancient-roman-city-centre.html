  vec3 ambient = uAmbientColor * (0.74 + hemi * 0.36);
  vec3 sun = uSunColor * (0.18 + diff * 0.92);
  color *= (ambient + sun) * face * vAO;

  float spec = pow(max(dot(reflect(-L, N), V), 0.0), 28.0);
  color += uSunColor * spec * (0.04 + hemi * 0.06);

  if (abs(vTile - uWaterTile) < 0.25) {
    float wave = sin(vWorldPos.x * 0.16 + uTime * 1.7) * sin(vWorldPos.z * 0.12 + uTime * 1.2);
    float fres = pow(1.0 - max(dot(N, V), 0.0), 3.0);
    color = mix(color, vec3(0.84, 0.93, 1.0), 0.18 + wave * 0.05);
    color += uSunColor * (0.10 + fres * 0.25);
  }

  float dist = length(uCameraPos.xz - vWorldPos.xz);
  float fog = smoothstep(120.0, 250.0, dist);
  color = mix(color, uFogColor, fog);

  fragColor = vec4(color, tex.a);
}
`;

class OrbitController {
  constructor(canvas) {
    this.canvas = canvas;
    this.target = Vec3.from(0, 14, 0);
    this.focus = Vec3.from(0, 14, 0);
    this.radius = 154;
    this.desiredRadius = 154;
    this.yaw = -0.8;
    this.pitch = -0.58;
    this.flyover = false;
    this.dragMode = null;
    this.lastX = 0;
    this.lastY = 0;

    this.eye = Vec3.from(0, 0, 0);
    this.up = Vec3.from(0, 1, 0);
    this.forward = Vec3.create();
    this.right = Vec3.create();
    this.view = Mat4.create();
    this.proj = Mat4.create();

    this.bind();
  }

  bind() {
    this.canvas.addEventListener('contextmenu', e => e.preventDefault());
    this.canvas.addEventListener('mousedown', e => {
      this.dragMode = e.button === 2 ? 'pan' : (e.button === 0 ? 'rotate' : null);
      this.lastX = e.clientX;
      this.lastY = e.clientY;
      if (this.dragMode) this.canvas.classList.add('dragging');
    });
    window.addEventListener('mouseup', () => {
      this.dragMode = null;
      this.canvas.classList.remove('dragging');
    });
    window.addEventListener('mousemove', e => {
      if (!this.dragMode) return;
      const dx = e.clientX - this.lastX;
      const dy = e.clientY - this.lastY;
      this.lastX = e.clientX;
      this.lastY = e.clientY;

      if (this.dragMode === 'rotate') {
        this.yaw -= dx * 0.0052;
        this.pitch -= dy * 0.0042;
        this.pitch = clamp(this.pitch, -1.45, 0.24);
      } else if (this.dragMode === 'pan') {
        this.updateBasis();
        const scale = Math.max(0.08, this.radius * 0.0019);
        Vec3.scaleAndAdd(this.target, this.target, this.right, -dx * scale);
        Vec3.scaleAndAdd(this.target, this.target, this.up, dy * scale);
        this.target[1] = clamp(this.target[1], 1, 60);
        Vec3.copy(this.focus, this.target);
      }
    });

    this.canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const zoom = Math.exp(e.deltaY * 0.0012);
      this.desiredRadius = clamp(this.desiredRadius * zoom, 28, 260);
    }, { passive: false });
  }

  recenter(x, y, z) {
    Vec3.set(this.focus, x, y, z);
  }

  updateBasis() {
    const cp = Math.cos(this.pitch);
    const sp = Math.sin(this.pitch);
    const cy = Math.cos(this.yaw);
    const sy = Math.sin(this.yaw);
    Vec3.set(this.eye,
      this.target[0] + this.radius * cp * Math.cos(this.yaw),
      this.target[1] + this.radius * -sp,
      this.target[2] + this.radius * cp * Math.sin(this.yaw)
    );
    Vec3.sub(this.forward, this.target, this.eye);
    Vec3.normalize(this.forward, this.forward);
    Vec3.cross(this.right, this.forward, this.up);
    Vec3.normalize(this.right, this.right);
  }

  update(dt) {
    this.radius = lerp(this.radius, this.desiredRadius, 0.14);
    Vec3.set(this.target,
      lerp(this.target[0], this.focus[0], 0.08),
      lerp(this.target[1], this.focus[1], 0.08),
      lerp(this.target[2], this.focus[2], 0.08)
    );

    if (this.flyover) {
      this.yaw += dt * 0.12;
      this.pitch = lerp(this.pitch, -0.55 + Math.sin(performance.now() * 0.00022) * 0.08, 0.04);
      this.desiredRadius = lerp(this.desiredRadius, 156 + Math.sin(performance.now() * 0.00018) * 18, 0.03);
    }

    this.updateBasis();
    Mat4.lookAt(this.view, this.eye, this.target, this.up);
  }

  resize(width, height) {
    Mat4.perspective(this.proj, 46 * RAD, width / Math.max(height, 1), 0.1, 520);
  }
}

class App {
  constructor() {
    this.canvas = document.getElementById('gl');
    this.hud = document.getElementById('hud');
    this.statsEl = document.getElementById('stats');
    this.errorBox = document.getElementById('errorBox');
    this.loadingEl = document.getElementById('loading');

    this.gl = this.canvas.getContext('webgl2', {
      alpha: true,
      antialias: true,
      depth: true,
      stencil: false,
      powerPreference: 'high-performance',
      preserveDrawingBuffer: false
    });

    if (!this.gl) {
      throw new Error('WebGL2 is unavailable in this browser. This simulation needs WebGL2 for hardware instancing.');
    }

    this.gl.clearColor(0, 0, 0, 0);
    this.gl.enable(this.gl.DEPTH_TEST);
    this.gl.enable(this.gl.CULL_FACE);
    this.gl.cullFace(this.gl.BACK);

    this.program = createProgram(this.gl, VERTEX_SHADER, FRAGMENT_SHADER);
    this.uniforms = {
      projection: this.gl.getUniformLocation(this.program, 'uProjection'),
      view: this.gl.getUniformLocation(this.program, 'uView'),
      atlasGrid: this.gl.getUniformLocation(this.program, 'uAtlasGrid'),
      lightDir: this.gl.getUniformLocation(this.program, 'uLightDir'),
      sunColor: this.gl.getUniformLocation(this.program, 'uSunColor'),
      ambientColor: this.gl.getUniformLocation(this.program, 'uAmbientColor'),
      fogColor: this.gl.getUniformLocation(this.program, 'uFogColor'),
      cameraPos: this.gl.getUniformLocation(this.program, 'uCameraPos'),
      atlas: this.gl.getUniformLocation(this.program, 'uAtlas'),
      time: this.gl.getUniformLocation(this.program, 'uTime'),
      waterTile: this.gl.getUniformLocation(this.program, 'uWaterTile')
    };

    this.cubeGeometry = createCubeGeometry();
    this.controller = new OrbitController(this.canvas);
    this.scene = null;
    this.atlas = null;
    this.generator = null;
    this.timeMode = 'day';
    this.seed = ((Date.now() ^ (Math.random() * 0xffffffff)) >>> 0) || 1;
    this.lastTime = performance.now();
    this.lastFpsStamp = performance.now();
    this.frameCount = 0;
    this.fps = 60;

    this.bindEvents();
    this.resize();
    this.rebuild(this.seed);
    requestAnimationFrame(this.frame.bind(this));
  }

  bindEvents() {
    window.addEventListener('resize', () => this.resize());
    window.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if (key === 'r') {
        const y = this.generator?.colosseum?.baseY ? this.generator.colosseum.baseY + 10 : 14;
        this.controller.recenter(0, y, 0);
      } else if (key === 'f') {
        this.controller.flyover = !this.controller.flyover;
      } else if (key === 't') {
        this.timeMode = this.timeMode === 'day' ? 'sunset' : 'day';
        document.body.className = this.timeMode;
      } else if (key === 'g') {
        this.seed = ((this.seed * 1664525 + 1013904223) >>> 0) || 1;
        this.rebuild(this.seed);
      }
    });
  }

  resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, CONFIG.MAX_PIXEL_RATIO);
    const width = Math.max(1, Math.floor(window.innerWidth * dpr));
    const height = Math.max(1, Math.floor(window.innerHeight * dpr));
    if (this.canvas.width !== width || this.canvas.height !== height) {
      this.canvas.width = width;
      this.canvas.height = height;
      this.gl.viewport(0, 0, width, height);
      this.controller.resize(width, height);
    }
  }

  setError(message) {
    this.errorBox.style.display = 'block';
    this.errorBox.textContent = message;
  }

  clearError() {
    this.errorBox.style.display = 'none';
    this.errorBox.textContent = '';
  }

  disposeScene() {
    if (this.scene?.opaque) this.scene.opaque.dispose();
    if (this.scene?.transparent) this.scene.transparent.dispose();
    if (this.atlas) this.atlas.dispose();
    this.scene = null;
    this.atlas = null;
  }

  rebuild(seed) {
    try {
      this.loadingEl.style.display = 'grid';
      this.clearError();
      this.disposeScene();

      this.generator = new RomanGenerator(seed);
      const builder = this.generator.build();
      this.atlas = new TextureAtlas(this.gl);
      this.scene = {
        opaque: new VoxelBatch(this.gl, this.cubeGeometry, builder.opaque),
        transparent: new VoxelBatch(this.gl, this.cubeGeometry, builder.transparent)
      };

      const focusY = this.generator.colosseum.baseY + 10;
      this.controller.recenter(0, focusY, 0);
      this.controller.target[0] = 0;
      this.controller.target[1] = focusY;
      this.controller.target[2] = 0;
      this.controller.desiredRadius = 154;
      this.controller.radius = 154;
      this.controller.yaw = -0.82;
      this.controller.pitch = -0.58;

      this.updateStats();
    } catch (err) {
      console.error(err);
      this.setError(String(err && err.stack ? err.stack : err));
    } finally {
      this.loadingEl.style.display = 'none';
    }
  }

  updateStats() {
    if (!this.generator) return;
    const gen = this.generator;
    const opaque = gen.stats.opaqueInstances.toLocaleString();
    const trans = gen.stats.transparentInstances.toLocaleString();
    this.statsEl.innerHTML = `
      <span class="pill">Seed <span class="mono">${this.seed}</span></span>
      <span class="pill">${this.timeMode === 'day' ? 'Daylight' : 'Sunset'}</span>
      <span class="pill">${this.controller.flyover ? 'Flyover on' : 'Flyover off'}</span>
      <span class="pill">Opaque voxels ${opaque}</span>
      <span class="pill">Transparent voxels ${trans}</span>
      <span class="pill">Insulae ${gen.residential.length}</span>
      <span class="pill">Landmarks ${gen.landmarks.length + 3}</span>
      <span class="pill">Skipped ${gen.stats.skippedLandmarks + gen.stats.skippedResidential}</span>
      <span class="pill">FPS ~${this.fps.toFixed(0)}</span>
    `;
  }

  applyLighting() {
    const gl = this.gl;
    const day = this.timeMode === 'day';

    const lightDir = day ? [0.55, 0.88, 0.24] : [-0.34, 0.34, 0.70];
    const sunColor = day ? [1.04, 0.98, 0.90] : [1.24, 0.78, 0.48];
    const ambient = day ? [0.58, 0.66, 0.80] : [0.44, 0.36, 0.48];
    const fog = day ? CONFIG.SKY_FOG_DAY : CONFIG.SKY_FOG_SUNSET;

    gl.uniform3fv(this.uniforms.lightDir, lightDir);
    gl.uniform3fv(this.uniforms.sunColor, sunColor);
    gl.uniform3fv(this.uniforms.ambientColor, ambient);
    gl.uniform3fv(this.uniforms.fogColor, fog);
    gl.uniform3fv(this.uniforms.cameraPos, this.controller.eye);
    gl.uniform1f(this.uniforms.time, performance.now() * 0.001);
  }

  frame(now) {
    const dt = Math.min((now - this.lastTime) * 0.001, 0.05);
    this.lastTime = now;

    this.controller.update(dt);

    const gl = this.gl;
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    if (this.scene && this.atlas) {
      gl.useProgram(this.program);
      this.atlas.bind(0);
      gl.uniform1i(this.uniforms.atlas, 0);
      gl.uniformMatrix4fv(this.uniforms.projection, false, this.controller.proj);
      gl.uniformMatrix4fv(this.uniforms.view, false, this.controller.view);
      gl.uniform2f(this.uniforms.atlasGrid, CONFIG.ATLAS_GRID_X, CONFIG.ATLAS_GRID_Y);
      gl.uniform1f(this.uniforms.waterTile, TILE.WATER);
      this.applyLighting();

      gl.disable(gl.BLEND);
      gl.depthMask(true);
      this.scene.opaque.draw();

      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
      gl.depthMask(false);
      this.scene.transparent.draw();
      gl.depthMask(true);
      gl.disable(gl.BLEND);
    }

    this.frameCount++;
    if (now - this.lastFpsStamp > 500) {
      this.fps = this.frameCount * 1000 / (now - this.lastFpsStamp);
      this.frameCount = 0;
      this.lastFpsStamp = now;
      this.updateStats();
    }

    requestAnimationFrame(this.frame.bind(this));
  }
}

window.addEventListener('error', ev => {
  const box = document.getElementById('errorBox');
  if (box) {
    box.style.display = 'block';
    box.textContent = String(ev.error && ev.error.stack ? ev.error.stack : ev.message || ev.error || 'Unknown error');
  }
});

try {
  new App();
} catch (err) {
  console.error(err);
  const box = document.getElementById('errorBox');
  if (box) {
    box.style.display = 'block';
    box.textContent = String(err && err.stack ? err.stack : err);
  }
  const loading = document.getElementById('loading');
  if (loading) loading.style.display = 'none';
}

})();
</script>
