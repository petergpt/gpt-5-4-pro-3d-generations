<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petra Treasury — Al-Khazneh</title>
  <style>
    :root {
      color-scheme: light;
      --panel-background: rgba(255, 244, 234, 0.88);
      --panel-border: rgba(121, 84, 57, 0.26);
      --panel-shadow: rgba(39, 23, 16, 0.18);
      --text-primary: #2b1f19;
      --text-secondary: #6a5649;
      --accent-color: #9c5736;
      --accent-color-strong: #b4653c;
      --button-background: rgba(255, 255, 255, 0.62);
      --button-border: rgba(121, 84, 57, 0.22);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #c7d6ee;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #controlPanel {
      position: fixed;
      top: 14px;
      left: 14px;
      width: min(248px, calc(100vw - 28px));
      background: var(--panel-background);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 12px 28px var(--panel-shadow);
      backdrop-filter: blur(12px);
      z-index: 10;
      user-select: none;
    }

    #controlPanel summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      list-style: none;
      padding: 11px 13px;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0.01em;
    }

    #controlPanel summary::-webkit-details-marker {
      display: none;
    }

    #controlPanel summary::after {
      content: "▾";
      color: var(--text-secondary);
      font-size: 12px;
      transition: transform 180ms ease;
    }

    #controlPanel:not([open]) summary::after {
      transform: rotate(-90deg);
    }

    #controlPanel[open] summary {
      border-bottom: 1px solid rgba(121, 84, 57, 0.14);
    }

    .panelContent {
      display: grid;
      gap: 12px;
      padding: 11px 13px 13px;
    }

    .controlBlock {
      display: grid;
      gap: 6px;
    }

    .labelLine {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .labelLine strong {
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 650;
    }

    .rangeLabels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent-color-strong);
    }

    .buttonRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--button-border);
      background: var(--button-background);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 640;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.78);
      border-color: rgba(121, 84, 57, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button.active {
      background: linear-gradient(180deg, rgba(184, 104, 63, 0.96), rgba(157, 84, 51, 0.96));
      color: #fffaf6;
      border-color: rgba(117, 56, 32, 0.6);
    }

    #hintBadge {
      position: fixed;
      right: 14px;
      bottom: 14px;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255, 248, 242, 0.68);
      border: 1px solid rgba(121, 84, 57, 0.16);
      color: rgba(43, 31, 25, 0.82);
      box-shadow: 0 8px 20px rgba(39, 23, 16, 0.12);
      backdrop-filter: blur(8px);
      font-size: 12px;
      z-index: 8;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      #controlPanel {
        width: min(228px, calc(100vw - 22px));
        top: 11px;
        left: 11px;
      }

      #hintBadge {
        right: 11px;
        bottom: 11px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <details id="controlPanel" open>
    <summary>The Treasury</summary>
    <div class="panelContent">
      <div class="controlBlock">
        <div class="labelLine">
          <span>Time of day</span>
          <strong id="timeOfDayLabel">Morning</strong>
        </div>
        <input id="timeOfDaySlider" type="range" min="0" max="100" step="1" value="24" />
        <div class="rangeLabels">
          <span>Morning</span>
          <span>Midday</span>
          <span>Golden</span>
        </div>
      </div>
      <div class="controlBlock">
        <div class="labelLine">
          <span>Camera</span>
          <strong>Orbit</strong>
        </div>
        <div class="buttonRow">
          <button id="plazaViewButton" class="active" type="button">Plaza</button>
          <button id="detailViewButton" type="button">Close-up</button>
        </div>
      </div>
    </div>
  </details>

  <div id="hintBadge">Drag to orbit · Scroll to zoom</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const timeOfDaySliderElement = document.getElementById('timeOfDaySlider');
    const timeOfDayLabelElement = document.getElementById('timeOfDayLabel');
    const plazaViewButtonElement = document.getElementById('plazaViewButton');
    const detailViewButtonElement = document.getElementById('detailViewButton');

    const applicationState = {
      timeOfDayNormalized: Number(timeOfDaySliderElement.value) / 100,
      activeCameraPreset: 'plaza',
      cameraTransitionState: null,
    };

    const mainScene = new THREE.Scene();
    mainScene.fog = new THREE.Fog(0xd8cec4, 92, 220);

    const mainRenderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: 'high-performance',
    });
    mainRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    mainRenderer.setSize(window.innerWidth, window.innerHeight);
    mainRenderer.outputColorSpace = THREE.SRGBColorSpace;
    mainRenderer.toneMapping = THREE.ACESFilmicToneMapping;
    mainRenderer.toneMappingExposure = 1.02;
    mainRenderer.shadowMap.enabled = true;
    mainRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(mainRenderer.domElement);

    const mainCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 320);
    const orbitControls = new OrbitControls(mainCamera, mainRenderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.055;
    orbitControls.enablePan = false;
    orbitControls.minDistance = 13;
    orbitControls.maxDistance = 118;
    orbitControls.minPolarAngle = 0.24;
    orbitControls.maxPolarAngle = Math.PI / 2.02;
    orbitControls.minAzimuthAngle = -Math.PI * 0.46;
    orbitControls.maxAzimuthAngle = Math.PI * 0.46;

    const cameraPresets = {
      plaza: {
        position: new THREE.Vector3(0, 22.5, 70),
        target: new THREE.Vector3(0, 18.4, 0),
      },
      detail: {
        position: new THREE.Vector3(9.5, 20.5, 22),
        target: new THREE.Vector3(4.2, 19.7, 0.8),
      },
    };

    mainCamera.position.copy(cameraPresets.plaza.position);
    orbitControls.target.copy(cameraPresets.plaza.target);

    const materialLibrary = createMaterialLibrary(mainRenderer);

    const siteRootGroup = new THREE.Group();
    mainScene.add(siteRootGroup);

    const skyDomeState = createSkyDome();
    mainScene.add(skyDomeState.skyMesh);

    const lightingState = createLightingState();
    mainScene.add(lightingState.hemisphereLight);
    mainScene.add(lightingState.ambientLight);
    mainScene.add(lightingState.sunLight);
    mainScene.add(lightingState.sunTargetObject);

    const plazaGroundMesh = createPlazaGround(materialLibrary);
    siteRootGroup.add(plazaGroundMesh);

    const cliffAssemblyGroup = createCliffAssembly(materialLibrary);
    siteRootGroup.add(cliffAssemblyGroup);

    const treasuryAssemblyGroup = createTreasuryAssembly(materialLibrary);
    siteRootGroup.add(treasuryAssemblyGroup);

    const scaleReferenceGroup = createScaleReferenceGroup(materialLibrary);
    siteRootGroup.add(scaleReferenceGroup);

    siteRootGroup.position.y = 0;

    timeOfDaySliderElement.addEventListener('input', () => {
      applicationState.timeOfDayNormalized = Number(timeOfDaySliderElement.value) / 100;
      updateLightingAndSky(applicationState.timeOfDayNormalized, lightingState, skyDomeState);
      updateTimeOfDayLabel(applicationState.timeOfDayNormalized);
    });

    plazaViewButtonElement.addEventListener('click', () => {
      activateCameraPreset('plaza');
    });

    detailViewButtonElement.addEventListener('click', () => {
      activateCameraPreset('detail');
    });

    window.addEventListener('resize', () => {
      mainCamera.aspect = window.innerWidth / window.innerHeight;
      mainCamera.updateProjectionMatrix();
      mainRenderer.setSize(window.innerWidth, window.innerHeight);
      mainRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    updateLightingAndSky(applicationState.timeOfDayNormalized, lightingState, skyDomeState);
    updateTimeOfDayLabel(applicationState.timeOfDayNormalized);
    orbitControls.update();

    function animateScene(animationTimeMilliseconds) {
      requestAnimationFrame(animateScene);
      updateCameraTransition(animationTimeMilliseconds);
      orbitControls.update();
      mainRenderer.render(mainScene, mainCamera);
    }

    requestAnimationFrame(animateScene);

    function activateCameraPreset(presetName) {
      const selectedPreset = cameraPresets[presetName];
      if (!selectedPreset) {
        return;
      }

      applicationState.activeCameraPreset = presetName;
      applicationState.cameraTransitionState = {
        startTimeMilliseconds: performance.now(),
        durationMilliseconds: 1100,
        startPosition: mainCamera.position.clone(),
        startTarget: orbitControls.target.clone(),
        endPosition: selectedPreset.position.clone(),
        endTarget: selectedPreset.target.clone(),
      };

      plazaViewButtonElement.classList.toggle('active', presetName === 'plaza');
      detailViewButtonElement.classList.toggle('active', presetName === 'detail');
    }

    function updateCameraTransition(animationTimeMilliseconds) {
      const currentTransitionState = applicationState.cameraTransitionState;
      if (!currentTransitionState) {
        return;
      }

      const transitionElapsedMilliseconds = animationTimeMilliseconds - currentTransitionState.startTimeMilliseconds;
      const transitionProgress = clampValue(
        transitionElapsedMilliseconds / currentTransitionState.durationMilliseconds,
        0,
        1,
      );
      const easedTransitionProgress = smoothstepValue(0, 1, transitionProgress);

      mainCamera.position.lerpVectors(
        currentTransitionState.startPosition,
        currentTransitionState.endPosition,
        easedTransitionProgress,
      );
      orbitControls.target.lerpVectors(
        currentTransitionState.startTarget,
        currentTransitionState.endTarget,
        easedTransitionProgress,
      );

      if (transitionProgress >= 1) {
        applicationState.cameraTransitionState = null;
      }
    }

    function updateTimeOfDayLabel(timeOfDayNormalized) {
      if (timeOfDayNormalized < 0.34) {
        timeOfDayLabelElement.textContent = 'Morning';
        return;
      }

      if (timeOfDayNormalized < 0.67) {
        timeOfDayLabelElement.textContent = 'Midday';
        return;
      }

      timeOfDayLabelElement.textContent = 'Golden';
    }

    function createLightingState() {
      const hemisphereLight = new THREE.HemisphereLight(0xd7e5ff, 0xd79f69, 1.05);
      const ambientLight = new THREE.AmbientLight(0xf7dcc0, 0.28);
      const sunLight = new THREE.DirectionalLight(0xffdfbc, 3.2);
      const sunTargetObject = new THREE.Object3D();
      sunTargetObject.position.set(0, 14, 0);

      sunLight.castShadow = true;
      sunLight.target = sunTargetObject;
      sunLight.shadow.mapSize.set(1536, 1536);
      sunLight.shadow.camera.left = -40;
      sunLight.shadow.camera.right = 40;
      sunLight.shadow.camera.top = 34;
      sunLight.shadow.camera.bottom = -8;
      sunLight.shadow.camera.near = 24;
      sunLight.shadow.camera.far = 150;
      sunLight.shadow.normalBias = 0.028;
      sunLight.shadow.bias = -0.0007;

      return {
        hemisphereLight,
        ambientLight,
        sunLight,
        sunTargetObject,
      };
    }

    function updateLightingAndSky(timeOfDayNormalized, lightingStateObject, skyDomeStateObject) {
      const morningBlendFactor = smoothstepValue(0, 0.5, timeOfDayNormalized);
      const eveningBlendFactor = smoothstepValue(0.5, 1, timeOfDayNormalized);

      const morningSunPosition = new THREE.Vector3(-42, 18, 34);
      const middaySunPosition = new THREE.Vector3(-8, 42, 26);
      const goldenSunPosition = new THREE.Vector3(39, 16, 30);

      const interpolatedSunPosition = new THREE.Vector3();
      if (timeOfDayNormalized <= 0.5) {
        interpolatedSunPosition.copy(morningSunPosition).lerp(middaySunPosition, morningBlendFactor);
      } else {
        interpolatedSunPosition.copy(middaySunPosition).lerp(goldenSunPosition, eveningBlendFactor);
      }

      lightingStateObject.sunLight.position.copy(interpolatedSunPosition);
      lightingStateObject.sunTargetObject.position.set(0, 17.5, 0);

      const morningSunColor = new THREE.Color('#ffd2a6');
      const middaySunColor = new THREE.Color('#fff4dd');
      const goldenSunColor = new THREE.Color('#ffbf88');
      const morningSkyColor = new THREE.Color('#86b3ea');
      const middaySkyColor = new THREE.Color('#5f99e6');
      const goldenSkyColor = new THREE.Color('#6595d7');
      const morningHorizonColor = new THREE.Color('#f4d2b2');
      const middayHorizonColor = new THREE.Color('#f4e0c6');
      const goldenHorizonColor = new THREE.Color('#f6c39b');
      const morningGroundColor = new THREE.Color('#e0bc96');
      const middayGroundColor = new THREE.Color('#dfbf9d');
      const goldenGroundColor = new THREE.Color('#d6a278');
      const morningFogColor = new THREE.Color('#dccdc1');
      const middayFogColor = new THREE.Color('#e5d8cb');
      const goldenFogColor = new THREE.Color('#d7bea9');

      const blendedSunColor = new THREE.Color();
      const blendedSkyColor = new THREE.Color();
      const blendedHorizonColor = new THREE.Color();
      const blendedGroundColor = new THREE.Color();
      const blendedFogColor = new THREE.Color();

      if (timeOfDayNormalized <= 0.5) {
        blendedSunColor.copy(morningSunColor).lerp(middaySunColor, morningBlendFactor);
        blendedSkyColor.copy(morningSkyColor).lerp(middaySkyColor, morningBlendFactor);
        blendedHorizonColor.copy(morningHorizonColor).lerp(middayHorizonColor, morningBlendFactor);
        blendedGroundColor.copy(morningGroundColor).lerp(middayGroundColor, morningBlendFactor);
        blendedFogColor.copy(morningFogColor).lerp(middayFogColor, morningBlendFactor);
      } else {
        blendedSunColor.copy(middaySunColor).lerp(goldenSunColor, eveningBlendFactor);
        blendedSkyColor.copy(middaySkyColor).lerp(goldenSkyColor, eveningBlendFactor);
        blendedHorizonColor.copy(middayHorizonColor).lerp(goldenHorizonColor, eveningBlendFactor);
        blendedGroundColor.copy(middayGroundColor).lerp(goldenGroundColor, eveningBlendFactor);
        blendedFogColor.copy(middayFogColor).lerp(goldenFogColor, eveningBlendFactor);
      }

      const sunIntensity = timeOfDayNormalized < 0.5
        ? lerpValue(2.95, 3.45, morningBlendFactor)
        : lerpValue(3.45, 2.85, eveningBlendFactor);
      const hemisphereIntensity = timeOfDayNormalized < 0.5
        ? lerpValue(1.0, 1.15, morningBlendFactor)
        : lerpValue(1.15, 0.95, eveningBlendFactor);
      const ambientIntensity = timeOfDayNormalized < 0.5
        ? lerpValue(0.23, 0.32, morningBlendFactor)
        : lerpValue(0.32, 0.26, eveningBlendFactor);

      lightingStateObject.sunLight.color.copy(blendedSunColor);
      lightingStateObject.sunLight.intensity = sunIntensity;
      lightingStateObject.hemisphereLight.color.copy(blendedSkyColor);
      lightingStateObject.hemisphereLight.groundColor.copy(blendedGroundColor);
      lightingStateObject.hemisphereLight.intensity = hemisphereIntensity;
      lightingStateObject.ambientLight.color.copy(blendedHorizonColor);
      lightingStateObject.ambientLight.intensity = ambientIntensity;

      skyDomeStateObject.uniforms.topColor.value.copy(blendedSkyColor);
      skyDomeStateObject.uniforms.horizonColor.value.copy(blendedHorizonColor);
      skyDomeStateObject.uniforms.groundColor.value.copy(blendedGroundColor);

      mainScene.fog.color.copy(blendedFogColor);
      mainRenderer.toneMappingExposure = timeOfDayNormalized < 0.5
        ? lerpValue(0.96, 1.06, morningBlendFactor)
        : lerpValue(1.06, 1.0, eveningBlendFactor);
    }

    function createSkyDome() {
      const skyUniforms = {
        topColor: { value: new THREE.Color('#5f99e6') },
        horizonColor: { value: new THREE.Color('#f4e0c6') },
        groundColor: { value: new THREE.Color('#dfbf9d') },
      };

      const skyMaterial = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        uniforms: skyUniforms,
        vertexShader: `
          varying vec3 vWorldDirection;
          void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldDirection = normalize(worldPosition.xyz);
            gl_Position = projectionMatrix * viewMatrix * worldPosition;
          }
        `,
        fragmentShader: `
          uniform vec3 topColor;
          uniform vec3 horizonColor;
          uniform vec3 groundColor;
          varying vec3 vWorldDirection;
          void main() {
            float verticalMix = clamp(vWorldDirection.y * 0.5 + 0.5, 0.0, 1.0);
            float horizonBlend = smoothstep(0.18, 0.82, verticalMix);
            vec3 skyBlend = mix(horizonColor, topColor, horizonBlend);
            float groundBlend = smoothstep(0.0, 0.28, verticalMix);
            vec3 finalColor = mix(groundColor, skyBlend, groundBlend);
            gl_FragColor = vec4(finalColor, 1.0);
          }
        `,
      });

      const skyMesh = new THREE.Mesh(new THREE.SphereGeometry(250, 48, 24), skyMaterial);
      return {
        skyMesh,
        uniforms: skyUniforms,
      };
    }

    function createMaterialLibrary(rendererInstance) {
      const supportedAnisotropy = Math.min(8, rendererInstance.capabilities.getMaxAnisotropy());

      const treasuryTexturePair = createSandstoneTexturePair(512, 2.4, 1.7, supportedAnisotropy, 0.8);
      const cliffTexturePair = createSandstoneTexturePair(512, 5.6, 2.4, supportedAnisotropy, 2.4);
      const sandTexturePair = createSandTexturePair(512, 18, 12, supportedAnisotropy);

      const treasuryStoneMaterial = new THREE.MeshStandardMaterial({
        map: treasuryTexturePair.colorTexture,
        bumpMap: treasuryTexturePair.heightTexture,
        bumpScale: 0.42,
        roughness: 0.93,
        metalness: 0,
      });

      const treasuryAccentMaterial = treasuryStoneMaterial.clone();
      treasuryAccentMaterial.color = new THREE.Color('#efb394');
      treasuryAccentMaterial.bumpScale = 0.55;

      const treasuryRecessMaterial = treasuryStoneMaterial.clone();
      treasuryRecessMaterial.color = new THREE.Color('#cf8768');
      treasuryRecessMaterial.bumpScale = 0.58;

      const cliffStoneMaterial = new THREE.MeshStandardMaterial({
        map: cliffTexturePair.colorTexture,
        bumpMap: cliffTexturePair.heightTexture,
        bumpScale: 0.55,
        roughness: 0.97,
        metalness: 0,
      });
      cliffStoneMaterial.color = new THREE.Color('#d28b6c');

      const sandMaterial = new THREE.MeshStandardMaterial({
        map: sandTexturePair.colorTexture,
        bumpMap: sandTexturePair.heightTexture,
        bumpScale: 0.16,
        roughness: 1,
        metalness: 0,
        color: new THREE.Color('#e0c193'),
      });

      const darkInteriorMaterial = new THREE.MeshStandardMaterial({
        color: '#2f241c',
        roughness: 1,
        metalness: 0,
      });

      const figureMaterial = new THREE.MeshStandardMaterial({
        color: '#5d4034',
        roughness: 0.92,
        metalness: 0,
      });

      const clothMaterial = new THREE.MeshStandardMaterial({
        color: '#bca58b',
        roughness: 0.96,
        metalness: 0,
      });

      const camelMaterial = new THREE.MeshStandardMaterial({
        color: '#8f684d',
        roughness: 0.95,
        metalness: 0,
      });

      return {
        treasuryStoneMaterial,
        treasuryAccentMaterial,
        treasuryRecessMaterial,
        cliffStoneMaterial,
        sandMaterial,
        darkInteriorMaterial,
        figureMaterial,
        clothMaterial,
        camelMaterial,
      };
    }

    function createSandstoneTexturePair(textureResolution, repeatHorizontal, repeatVertical, anisotropyLevel, seedOffset) {
      const sandstoneColorCanvas = document.createElement('canvas');
      sandstoneColorCanvas.width = textureResolution;
      sandstoneColorCanvas.height = textureResolution;
      const sandstoneColorContext = sandstoneColorCanvas.getContext('2d');
      const sandstoneColorData = sandstoneColorContext.createImageData(textureResolution, textureResolution);
      const sandstoneColorPixels = sandstoneColorData.data;

      const sandstoneHeightCanvas = document.createElement('canvas');
      sandstoneHeightCanvas.width = textureResolution;
      sandstoneHeightCanvas.height = textureResolution;
      const sandstoneHeightContext = sandstoneHeightCanvas.getContext('2d');
      const sandstoneHeightData = sandstoneHeightContext.createImageData(textureResolution, textureResolution);
      const sandstoneHeightPixels = sandstoneHeightData.data;

      const sandstonePalette = [
        [246, 206, 171],
        [235, 169, 132],
        [223, 133, 104],
        [196, 102, 87],
        [247, 198, 161],
      ];

      for (let pixelYIndex = 0; pixelYIndex < textureResolution; pixelYIndex += 1) {
        for (let pixelXIndex = 0; pixelXIndex < textureResolution; pixelXIndex += 1) {
          const textureSampleX = pixelXIndex / textureResolution;
          const textureSampleY = pixelYIndex / textureResolution;
          const pixelOffset = (pixelYIndex * textureResolution + pixelXIndex) * 4;

          const horizontalStrata = Math.sin((textureSampleY * 24 + seedOffset) * Math.PI) * 0.38;
          const secondaryBands = Math.sin((textureSampleY * 59 + textureSampleX * 5.4 + seedOffset * 0.7) * Math.PI) * 0.21;
          const fineBands = Math.sin((textureSampleY * 135 + textureSampleX * 13.2 + seedOffset * 1.9) * Math.PI) * 0.09;
          const granularNoise = pseudoRandomFromCoordinates(textureSampleX * 251, textureSampleY * 277, seedOffset) - 0.5;
          const diagonalNoise = pseudoRandomFromCoordinates(textureSampleX * 481 + textureSampleY * 93, textureSampleY * 397, seedOffset + 2.7) - 0.5;
          const bandSelectorValue = fractValue(
            textureSampleY * 3.9 +
            horizontalStrata * 0.19 +
            secondaryBands * 0.14 +
            granularNoise * 0.1 +
            seedOffset * 0.17
          );
          const scaledPaletteIndex = bandSelectorValue * (sandstonePalette.length - 1);
          const lowerPaletteIndex = Math.floor(scaledPaletteIndex);
          const upperPaletteIndex = Math.min(sandstonePalette.length - 1, lowerPaletteIndex + 1);
          const paletteBlendAmount = scaledPaletteIndex - lowerPaletteIndex;

          const lowerPaletteColor = sandstonePalette[lowerPaletteIndex];
          const upperPaletteColor = sandstonePalette[upperPaletteIndex];

          const redChannelValue = lerpValue(lowerPaletteColor[0], upperPaletteColor[0], paletteBlendAmount);
          const greenChannelValue = lerpValue(lowerPaletteColor[1], upperPaletteColor[1], paletteBlendAmount);
          const blueChannelValue = lerpValue(lowerPaletteColor[2], upperPaletteColor[2], paletteBlendAmount);

          const stoneVariationValue = horizontalStrata * 32 + secondaryBands * 24 + fineBands * 14 + granularNoise * 18 + diagonalNoise * 10;
          sandstoneColorPixels[pixelOffset] = clampValue(redChannelValue + stoneVariationValue, 0, 255);
          sandstoneColorPixels[pixelOffset + 1] = clampValue(greenChannelValue + stoneVariationValue * 0.82, 0, 255);
          sandstoneColorPixels[pixelOffset + 2] = clampValue(blueChannelValue + stoneVariationValue * 0.75, 0, 255);
          sandstoneColorPixels[pixelOffset + 3] = 255;

          const crackNoiseValue = Math.abs(Math.sin((textureSampleX * 18 + textureSampleY * 11 + seedOffset) * Math.PI));
          const heightValue = 138 + horizontalStrata * 34 + secondaryBands * 26 + fineBands * 22 + granularNoise * 30 + crackNoiseValue * 18;
          sandstoneHeightPixels[pixelOffset] = clampValue(heightValue, 0, 255);
          sandstoneHeightPixels[pixelOffset + 1] = clampValue(heightValue, 0, 255);
          sandstoneHeightPixels[pixelOffset + 2] = clampValue(heightValue, 0, 255);
          sandstoneHeightPixels[pixelOffset + 3] = 255;
        }
      }

      sandstoneColorContext.putImageData(sandstoneColorData, 0, 0);
      sandstoneHeightContext.putImageData(sandstoneHeightData, 0, 0);

      const colorTexture = new THREE.CanvasTexture(sandstoneColorCanvas);
      colorTexture.wrapS = THREE.RepeatWrapping;
      colorTexture.wrapT = THREE.RepeatWrapping;
      colorTexture.repeat.set(repeatHorizontal, repeatVertical);
      colorTexture.anisotropy = anisotropyLevel;
      colorTexture.colorSpace = THREE.SRGBColorSpace;

      const heightTexture = new THREE.CanvasTexture(sandstoneHeightCanvas);
      heightTexture.wrapS = THREE.RepeatWrapping;
      heightTexture.wrapT = THREE.RepeatWrapping;
      heightTexture.repeat.set(repeatHorizontal, repeatVertical);
      heightTexture.anisotropy = anisotropyLevel;

      return {
        colorTexture,
        heightTexture,
      };
    }

    function createSandTexturePair(textureResolution, repeatHorizontal, repeatVertical, anisotropyLevel) {
      const sandColorCanvas = document.createElement('canvas');
      sandColorCanvas.width = textureResolution;
      sandColorCanvas.height = textureResolution;
      const sandColorContext = sandColorCanvas.getContext('2d');
      const sandColorData = sandColorContext.createImageData(textureResolution, textureResolution);
      const sandColorPixels = sandColorData.data;

      const sandHeightCanvas = document.createElement('canvas');
      sandHeightCanvas.width = textureResolution;
      sandHeightCanvas.height = textureResolution;
      const sandHeightContext = sandHeightCanvas.getContext('2d');
      const sandHeightData = sandHeightContext.createImageData(textureResolution, textureResolution);
      const sandHeightPixels = sandHeightData.data;

      for (let sandPixelYIndex = 0; sandPixelYIndex < textureResolution; sandPixelYIndex += 1) {
        for (let sandPixelXIndex = 0; sandPixelXIndex < textureResolution; sandPixelXIndex += 1) {
          const sandSampleX = sandPixelXIndex / textureResolution;
          const sandSampleY = sandPixelYIndex / textureResolution;
          const sandPixelOffset = (sandPixelYIndex * textureResolution + sandPixelXIndex) * 4;

          const duneWaveValue = Math.sin((sandSampleX * 28 + sandSampleY * 4.2) * Math.PI) * 0.14;
          const crossWaveValue = Math.sin((sandSampleY * 24 - sandSampleX * 3.1) * Math.PI) * 0.11;
          const grainNoiseValue = pseudoRandomFromCoordinates(sandSampleX * 731, sandSampleY * 593, 5.3) - 0.5;
          const pebbleNoiseValue = pseudoRandomFromCoordinates(sandSampleX * 1201, sandSampleY * 1817, 8.9) - 0.5;
          const toneShiftValue = duneWaveValue * 18 + crossWaveValue * 12 + grainNoiseValue * 22;

          sandColorPixels[sandPixelOffset] = clampValue(225 + toneShiftValue, 0, 255);
          sandColorPixels[sandPixelOffset + 1] = clampValue(195 + toneShiftValue * 0.87, 0, 255);
          sandColorPixels[sandPixelOffset + 2] = clampValue(147 + toneShiftValue * 0.72, 0, 255);
          sandColorPixels[sandPixelOffset + 3] = 255;

          const sandHeightValue = 126 + duneWaveValue * 34 + crossWaveValue * 24 + grainNoiseValue * 30 + pebbleNoiseValue * 24;
          sandHeightPixels[sandPixelOffset] = clampValue(sandHeightValue, 0, 255);
          sandHeightPixels[sandPixelOffset + 1] = clampValue(sandHeightValue, 0, 255);
          sandHeightPixels[sandPixelOffset + 2] = clampValue(sandHeightValue, 0, 255);
          sandHeightPixels[sandPixelOffset + 3] = 255;
        }
      }

      sandColorContext.putImageData(sandColorData, 0, 0);
      sandHeightContext.putImageData(sandHeightData, 0, 0);

      const colorTexture = new THREE.CanvasTexture(sandColorCanvas);
      colorTexture.wrapS = THREE.RepeatWrapping;
      colorTexture.wrapT = THREE.RepeatWrapping;
      colorTexture.repeat.set(repeatHorizontal, repeatVertical);
      colorTexture.anisotropy = anisotropyLevel;
      colorTexture.colorSpace = THREE.SRGBColorSpace;

      const heightTexture = new THREE.CanvasTexture(sandHeightCanvas);
      heightTexture.wrapS = THREE.RepeatWrapping;
      heightTexture.wrapT = THREE.RepeatWrapping;
      heightTexture.repeat.set(repeatHorizontal, repeatVertical);
      heightTexture.anisotropy = anisotropyLevel;

      return {
        colorTexture,
        heightTexture,
      };
    }

    function createPlazaGround(materialLibraryObject) {
      const plazaGeometry = new THREE.PlaneGeometry(220, 150, 150, 100);
      plazaGeometry.rotateX(-Math.PI / 2);

      const plazaPositionAttribute = plazaGeometry.attributes.position;
      const plazaVertex = new THREE.Vector3();

      for (let plazaVertexIndex = 0; plazaVertexIndex < plazaPositionAttribute.count; plazaVertexIndex += 1) {
        plazaVertex.fromBufferAttribute(plazaPositionAttribute, plazaVertexIndex);
        const plazaDistanceFromCenter = Math.sqrt(
          plazaVertex.x * plazaVertex.x +
          (plazaVertex.z - 24) * (plazaVertex.z - 24)
        );
        const plazaFlatteningFactor = smoothstepValue(0, 28, plazaDistanceFromCenter);
        const duneRippleValue = Math.sin(plazaVertex.x * 0.15 + plazaVertex.z * 0.07) * 0.09;
        const broadUndulationValue = Math.sin(plazaVertex.x * 0.035) * 0.24 + Math.sin(plazaVertex.z * 0.04 + 1.2) * 0.18;
        const granularGroundNoise = layeredRockNoise(plazaVertex.x * 0.18, plazaVertex.z * 0.15, 7.2) * 0.22;
        const cliffFootLift = Math.max(0, (-2 - plazaVertex.z)) * 0.085;
        plazaVertex.y = (duneRippleValue + broadUndulationValue + granularGroundNoise) * plazaFlatteningFactor + cliffFootLift;
        plazaPositionAttribute.setXYZ(plazaVertexIndex, plazaVertex.x, plazaVertex.y, plazaVertex.z);
      }

      plazaGeometry.computeVertexNormals();
      const plazaMesh = new THREE.Mesh(plazaGeometry, materialLibraryObject.sandMaterial);
      plazaMesh.receiveShadow = true;
      return plazaMesh;
    }

    function createRockBlock(blockWidth, blockHeight, blockDepth, displacementAmplitude, noiseSeedValue, materialInstance) {
      const widthSegments = Math.max(18, Math.round(blockWidth * 1.2));
      const heightSegments = Math.max(12, Math.round(blockHeight * 0.8));
      const rockGeometry = new THREE.BoxGeometry(blockWidth, blockHeight, blockDepth, widthSegments, heightSegments, 4);
      const rockPositionAttribute = rockGeometry.attributes.position;
      const rockVertex = new THREE.Vector3();
      const frontFaceDepth = blockDepth / 2;
      const outerFaceWidth = blockWidth / 2;
      const topFaceHeight = blockHeight / 2;

      for (let rockVertexIndex = 0; rockVertexIndex < rockPositionAttribute.count; rockVertexIndex += 1) {
        rockVertex.fromBufferAttribute(rockPositionAttribute, rockVertexIndex);
        const frontSurfaceFactor = smoothstepValue(frontFaceDepth - 0.2, frontFaceDepth, rockVertex.z);
        const topSurfaceFactor = smoothstepValue(topFaceHeight - 0.2, topFaceHeight, rockVertex.y);
        const sideSurfaceFactor = smoothstepValue(outerFaceWidth - 0.2, outerFaceWidth, Math.abs(rockVertex.x));

        if (frontSurfaceFactor > 0) {
          const primaryFaceNoise = layeredRockNoise(rockVertex.x * 0.14, rockVertex.y * 0.11, noiseSeedValue);
          const striationNoise = Math.sin(rockVertex.y * 0.52 + noiseSeedValue * 2.1) * 0.32;
          const chippedNoise = (pseudoRandomFromCoordinates(rockVertex.x * 0.37, rockVertex.y * 0.29, noiseSeedValue + 5.4) - 0.5) * 0.7;
          rockVertex.z += (primaryFaceNoise + striationNoise + chippedNoise) * displacementAmplitude * frontSurfaceFactor;
        }

        if (topSurfaceFactor > 0) {
          const topNoise = layeredRockNoise(rockVertex.x * 0.09, rockVertex.z * 0.12, noiseSeedValue + 3.8);
          rockVertex.y += topNoise * 2.6 * topSurfaceFactor;
        }

        if (sideSurfaceFactor > 0) {
          const sideNoise = layeredRockNoise(rockVertex.y * 0.12, rockVertex.z * 0.08, noiseSeedValue + 7.6);
          rockVertex.x += Math.sign(rockVertex.x) * sideNoise * 1.05 * sideSurfaceFactor;
        }

        rockPositionAttribute.setXYZ(rockVertexIndex, rockVertex.x, rockVertex.y, rockVertex.z);
      }

      rockGeometry.computeVertexNormals();
      const rockMesh = new THREE.Mesh(rockGeometry, materialInstance);
      rockMesh.castShadow = true;
      rockMesh.receiveShadow = true;
      return rockMesh;
    }

    function createFlutedCylinderGeometry(cylinderHeight, radiusTop, radiusBottom, fluteDepth, fluteCount, radialSegmentCount, heightSegmentCount) {
      const flutedCylinderGeometry = new THREE.CylinderGeometry(
        radiusTop,
        radiusBottom,
        cylinderHeight,
        radialSegmentCount,
        heightSegmentCount,
        true,
      );
      const cylinderPositionAttribute = flutedCylinderGeometry.attributes.position;
      const cylinderVertex = new THREE.Vector3();

      for (let cylinderVertexIndex = 0; cylinderVertexIndex < cylinderPositionAttribute.count; cylinderVertexIndex += 1) {
        cylinderVertex.fromBufferAttribute(cylinderPositionAttribute, cylinderVertexIndex);
        const originalRadius = Math.sqrt(cylinderVertex.x * cylinderVertex.x + cylinderVertex.z * cylinderVertex.z);
        if (originalRadius < 0.0001) {
          continue;
        }

        const angularPosition = Math.atan2(cylinderVertex.z, cylinderVertex.x);
        const fluteWave = Math.max(0, Math.cos(angularPosition * fluteCount));
        const adjustedRadius = originalRadius - Math.pow(fluteWave, 2.3) * fluteDepth;
        const radialScale = adjustedRadius / originalRadius;
        cylinderVertex.x *= radialScale;
        cylinderVertex.z *= radialScale;
        cylinderPositionAttribute.setXYZ(cylinderVertexIndex, cylinderVertex.x, cylinderVertex.y, cylinderVertex.z);
      }

      flutedCylinderGeometry.computeVertexNormals();
      return flutedCylinderGeometry;
    }

    function createPedimentMesh(totalWidth, totalHeight, totalDepth, pedimentMaterial) {
      const pedimentShape = new THREE.Shape();
      pedimentShape.moveTo(-totalWidth / 2, -totalHeight / 2);
      pedimentShape.lineTo(totalWidth / 2, -totalHeight / 2);
      pedimentShape.lineTo(0, totalHeight / 2);
      pedimentShape.closePath();

      const pedimentGeometry = new THREE.ExtrudeGeometry(pedimentShape, {
        depth: totalDepth,
        bevelEnabled: false,
      });
      pedimentGeometry.center();
      pedimentGeometry.translate(0, 0, totalDepth * 0.5);

      return new THREE.Mesh(pedimentGeometry, pedimentMaterial);
    }

    function createBrokenPedimentMesh(segmentWidth, segmentHeight, segmentDepth, segmentSide, pedimentMaterial) {
      const brokenShape = new THREE.Shape();
      if (segmentSide === 'left') {
        brokenShape.moveTo(-segmentWidth / 2, -segmentHeight / 2);
        brokenShape.lineTo(segmentWidth / 2, -segmentHeight / 2);
        brokenShape.lineTo(segmentWidth / 2, segmentHeight * 0.42);
        brokenShape.lineTo(segmentWidth * 0.08, segmentHeight / 2);
        brokenShape.closePath();
      } else {
        brokenShape.moveTo(-segmentWidth / 2, segmentHeight * 0.42);
        brokenShape.lineTo(-segmentWidth * 0.08, segmentHeight / 2);
        brokenShape.lineTo(segmentWidth / 2, -segmentHeight / 2);
        brokenShape.lineTo(-segmentWidth / 2, -segmentHeight / 2);
        brokenShape.closePath();
      }

      const brokenGeometry = new THREE.ExtrudeGeometry(brokenShape, {
        depth: segmentDepth,
        bevelEnabled: false,
      });
      brokenGeometry.center();
      brokenGeometry.translate(0, 0, segmentDepth * 0.5);
      return new THREE.Mesh(brokenGeometry, pedimentMaterial);
    }

    function clampValue(sampleValue, minimumValue, maximumValue) {
      return Math.min(maximumValue, Math.max(minimumValue, sampleValue));
    }

    function lerpValue(startValue, endValue, interpolationAmount) {
      return startValue + (endValue - startValue) * interpolationAmount;
    }

    function inverseLerpValue(startValue, endValue, sampleValue) {
      if (endValue === startValue) {
        return 0;
      }
      return clampValue((sampleValue - startValue) / (endValue - startValue), 0, 1);
    }

    function smoothstepValue(edgeStart, edgeEnd, sampleValue) {
      const normalizedValue = inverseLerpValue(edgeStart, edgeEnd, sampleValue);
      return normalizedValue * normalizedValue * (3 - 2 * normalizedValue);
    }

    function fractValue(sampleValue) {
      return sampleValue - Math.floor(sampleValue);
    }

    function pseudoRandomFromCoordinates(sampleXValue, sampleYValue, seedOffsetValue) {
      return fractValue(
        Math.sin(sampleXValue * 127.1 + sampleYValue * 311.7 + seedOffsetValue * 74.7) * 43758.5453123,
      );
    }

    function layeredRockNoise(sampleXValue, sampleYValue, seedOffsetValue) {
      const coarseNoise = pseudoRandomFromCoordinates(sampleXValue, sampleYValue, seedOffsetValue) * 2 - 1;
      const mediumNoise = pseudoRandomFromCoordinates(sampleXValue * 2.1, sampleYValue * 2.1, seedOffsetValue + 1.3) * 2 - 1;
      const fineNoise = pseudoRandomFromCoordinates(sampleXValue * 4.6, sampleYValue * 4.6, seedOffsetValue + 2.7) * 2 - 1;
      const waveNoise = Math.sin(sampleXValue * 1.7 + sampleYValue * 0.8 + seedOffsetValue * 0.5) * 0.4;
      return coarseNoise * 0.55 + mediumNoise * 0.3 + fineNoise * 0.15 + waveNoise;
    }
