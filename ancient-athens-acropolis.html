<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ancient Athens — Acropolis</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(16, 19, 24, 0.5);
      --panel-border: rgba(255, 255, 255, 0.14);
      --panel-text: #f5efe4;
      --accent: #d8ba82;
      --accent-strong: #f1d096;
      --shadow: rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #6fa0e0 0%, #a9c8ee 38%, #d7e2ef 62%, #f5ead8 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #scene-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      width: min(280px, calc(100vw - 24px));
      padding: 11px 12px 10px;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      color: var(--panel-text);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 26px var(--shadow);
      user-select: none;
    }

    #ui-title {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    .ui-row {
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1.2;
    }

    .ui-row:last-child {
      margin-bottom: 0;
    }

    .ui-label {
      color: rgba(255, 247, 232, 0.95);
    }

    .ui-value {
      min-width: 54px;
      text-align: right;
      color: var(--accent-strong);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
    }

    input[type="checkbox"] {
      accent-color: var(--accent);
    }

    #camera-select {
      width: 100%;
      padding: 5px 7px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: var(--panel-text);
      outline: none;
    }

    #camera-select option {
      color: #111;
    }

    #crowd-checkbox-row {
      grid-template-columns: 74px auto 1fr;
    }

    #crowd-checkbox {
      margin: 0;
    }

    #hint-text {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255, 243, 222, 0.72);
      letter-spacing: 0.01em;
    }

    #fps-badge {
      position: absolute;
      right: 12px;
      top: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(16, 19, 24, 0.42);
      color: #f8f0df;
      backdrop-filter: blur(12px);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
    }

    @media (max-width: 720px) {
      #ui-panel {
        width: min(300px, calc(100vw - 16px));
        top: 8px;
        left: 8px;
        padding: 10px;
      }

      #fps-badge {
        top: auto;
        bottom: 8px;
        right: 8px;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene-canvas" aria-label="Ancient Athens Acropolis scene"></canvas>

  <div id="ui-panel">
    <h1 id="ui-title">Acropolis — Ancient Athens</h1>

    <div class="ui-row">
      <div class="ui-label">Time</div>
      <input id="time-slider" type="range" min="0" max="1" step="0.001" value="0.72" />
      <div id="time-value" class="ui-value">Golden hour</div>
    </div>

    <div class="ui-row">
      <div class="ui-label">Haze</div>
      <input id="haze-slider" type="range" min="0" max="1" step="0.001" value="0.34" />
      <div id="haze-value" class="ui-value">34%</div>
    </div>

    <div class="ui-row" id="crowd-checkbox-row">
      <div class="ui-label">Crowd</div>
      <input id="crowd-checkbox" type="checkbox" checked />
      <div class="ui-value" id="crowd-state-value">On</div>
    </div>

    <div class="ui-row">
      <div class="ui-label">Density</div>
      <input id="crowd-density-slider" type="range" min="0" max="1" step="0.001" value="0.42" />
      <div id="crowd-density-value" class="ui-value">42%</div>
    </div>

    <div class="ui-row">
      <div class="ui-label">Camera</div>
      <select id="camera-select">
        <option value="postcard" selected>Classic postcard</option>
        <option value="inspection">Close inspection</option>
        <option value="flyover">Flyover path</option>
      </select>
      <div id="camera-value" class="ui-value">View</div>
    </div>

    <div id="hint-text">Drag to orbit in postcard and inspection views.</div>
  </div>

  <div id="fps-badge">FPS --</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
    import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js'

    const sceneCanvasElement = document.getElementById('scene-canvas')
    const timeSliderElement = document.getElementById('time-slider')
    const timeValueElement = document.getElementById('time-value')
    const hazeSliderElement = document.getElementById('haze-slider')
    const hazeValueElement = document.getElementById('haze-value')
    const crowdCheckboxElement = document.getElementById('crowd-checkbox')
    const crowdStateValueElement = document.getElementById('crowd-state-value')
    const crowdDensitySliderElement = document.getElementById('crowd-density-slider')
    const crowdDensityValueElement = document.getElementById('crowd-density-value')
    const cameraSelectElement = document.getElementById('camera-select')
    const cameraValueElement = document.getElementById('camera-value')
    const fpsBadgeElement = document.getElementById('fps-badge')

    const acropolisScene = new THREE.Scene()
    const viewportRenderer = new THREE.WebGLRenderer({ canvas: sceneCanvasElement, antialias: true })
    viewportRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    viewportRenderer.setSize(window.innerWidth, window.innerHeight)
    viewportRenderer.outputColorSpace = THREE.SRGBColorSpace
    viewportRenderer.toneMapping = THREE.ACESFilmicToneMapping
    viewportRenderer.toneMappingExposure = 1.08
    viewportRenderer.shadowMap.enabled = true
    viewportRenderer.shadowMap.type = THREE.PCFShadowMap

    const mainCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1200)
    mainCamera.position.set(-158, 92, 176)

    const orbitController = new OrbitControls(mainCamera, viewportRenderer.domElement)
    orbitController.enableDamping = true
    orbitController.enablePan = false
    orbitController.minDistance = 34
    orbitController.maxDistance = 320
    orbitController.maxPolarAngle = Math.PI * 0.485
    orbitController.target.set(2, 61, 4)

    const acropolisFogColor = new THREE.Color(0xa8bfd7)
    acropolisScene.fog = new THREE.Fog(acropolisFogColor, 160, 450)
    acropolisScene.background = acropolisFogColor.clone()

    const rootGroup = new THREE.Group()
    acropolisScene.add(rootGroup)

    const terrainGroup = new THREE.Group()
    const templeGroup = new THREE.Group()
    const vegetationGroup = new THREE.Group()
    const cityGroup = new THREE.Group()
    const pathGroup = new THREE.Group()
    const crowdGroup = new THREE.Group()
    rootGroup.add(terrainGroup, cityGroup, vegetationGroup, pathGroup, templeGroup, crowdGroup)

    const hemisphereLight = new THREE.HemisphereLight(0xcfe0ff, 0xc4a67a, 1.55)
    acropolisScene.add(hemisphereLight)

    const fillLight = new THREE.DirectionalLight(0xcfdfff, 0.25)
    fillLight.position.set(-80, 110, -90)
    acropolisScene.add(fillLight)

    const sunLight = new THREE.DirectionalLight(0xffe3b4, 2.6)
    sunLight.position.set(140, 88, 64)
    sunLight.castShadow = true
    sunLight.shadow.mapSize.set(2048, 2048)
    sunLight.shadow.camera.left = -125
    sunLight.shadow.camera.right = 125
    sunLight.shadow.camera.top = 125
    sunLight.shadow.camera.bottom = -125
    sunLight.shadow.camera.near = 30
    sunLight.shadow.camera.far = 360
    sunLight.shadow.bias = -0.0007
    sunLight.shadow.normalBias = 0.025
    sunLight.shadow.radius = 1.8
    acropolisScene.add(sunLight)

    const sunTargetObject = new THREE.Object3D()
    sunTargetObject.position.set(0, 60, 0)
    acropolisScene.add(sunTargetObject)
    sunLight.target = sunTargetObject

    const skyUniforms = {
      topColor: { value: new THREE.Color(0x6ca8ff) },
      horizonColor: { value: new THREE.Color(0xd9e6ff) },
      groundColor: { value: new THREE.Color(0xf4dcc0) }
    }

    const skyDomeMaterial = new THREE.ShaderMaterial({
      uniforms: skyUniforms,
      vertexShader: `
        varying vec3 skyWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          skyWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 horizonColor;
        uniform vec3 groundColor;
        varying vec3 skyWorldPosition;
        void main() {
          float verticalBlend = normalize(skyWorldPosition).y * 0.5 + 0.5;
          float horizonBand = exp(-pow(abs(verticalBlend - 0.5) * 7.0, 1.28));
          vec3 lowerColor = mix(groundColor, horizonColor, smoothstep(0.02, 0.48, verticalBlend));
          vec3 upperColor = mix(horizonColor, topColor, smoothstep(0.46, 0.98, verticalBlend));
          vec3 finalColor = mix(lowerColor, upperColor, smoothstep(0.38, 0.62, verticalBlend));
          finalColor += horizonBand * 0.05;
          gl_FragColor = vec4(finalColor, 1.0);
        }
      `,
      side: THREE.BackSide,
      depthWrite: false
    })

    const skyDomeGeometry = new THREE.SphereGeometry(900, 32, 18)
    const skyDomeMesh = new THREE.Mesh(skyDomeGeometry, skyDomeMaterial)
    acropolisScene.add(skyDomeMesh)

    const sharedTemporaryMatrix = new THREE.Matrix4()
    const sharedTemporaryQuaternion = new THREE.Quaternion()
    const sharedTemporaryEuler = new THREE.Euler()
    const sharedTemporaryScale = new THREE.Vector3()
    const sharedTemporaryVector = new THREE.Vector3()
    const sharedSecondaryVector = new THREE.Vector3()
    const sharedColorA = new THREE.Color()
    const sharedColorB = new THREE.Color()
    const sharedColorC = new THREE.Color()

    function createSeededRandom(seedValue) {
      let workingSeed = seedValue >>> 0
      return function generateSeededValue() {
        workingSeed += 0x6D2B79F5
        let scrambledValue = Math.imul(workingSeed ^ (workingSeed >>> 15), 1 | workingSeed)
        scrambledValue ^= scrambledValue + Math.imul(scrambledValue ^ (scrambledValue >>> 7), 61 | scrambledValue)
        return ((scrambledValue ^ (scrambledValue >>> 14)) >>> 0) / 4294967296
      }
    }

    function clampValue(valueNumber, minimumValue, maximumValue) {
      return Math.min(maximumValue, Math.max(minimumValue, valueNumber))
    }

    function smoothstepValue(edgeStart, edgeEnd, inputValue) {
      const normalizedValue = clampValue((inputValue - edgeStart) / (edgeEnd - edgeStart), 0, 1)
      return normalizedValue * normalizedValue * (3 - 2 * normalizedValue)
    }

    function ridgeNoise(sampleX, sampleZ) {
      const firstWave = Math.sin(sampleX * 0.13) * Math.cos(sampleZ * 0.11) * 1.7
      const secondWave = Math.sin((sampleX + sampleZ) * 0.064 + Math.cos(sampleZ * 0.041) * 2.2) * 1.2
      const thirdWave = Math.cos(sampleZ * 0.19 - sampleX * 0.053) * 0.72
      const fourthWave = Math.sin((sampleX * 0.031) - (sampleZ * 0.028)) * 1.35
      return firstWave + secondWave + thirdWave + fourthWave
    }

    const ascentPolylinePoints = [
      new THREE.Vector2(-146, 170),
      new THREE.Vector2(-124, 152),
      new THREE.Vector2(-101, 131),
      new THREE.Vector2(-78, 108),
      new THREE.Vector2(-57, 88),
      new THREE.Vector2(-36, 66),
      new THREE.Vector2(-18, 46),
      new THREE.Vector2(-6, 28),
      new THREE.Vector2(2, 12)
    ]

    const ascentPathCurve = new THREE.CatmullRomCurve3(
      ascentPolylinePoints.map(function mapPolylineToCurve(polylinePoint) {
        return new THREE.Vector3(polylinePoint.x, 0, polylinePoint.y)
      }),
      false,
      'centripetal'
    )

    function distanceToLineSegment(samplePoint, segmentStartPoint, segmentEndPoint) {
      const segmentVectorX = segmentEndPoint.x - segmentStartPoint.x
      const segmentVectorZ = segmentEndPoint.y - segmentStartPoint.y
      const pointVectorX = samplePoint.x - segmentStartPoint.x
      const pointVectorZ = samplePoint.y - segmentStartPoint.y
      const projectionDenominator = (segmentVectorX * segmentVectorX) + (segmentVectorZ * segmentVectorZ)

      if (projectionDenominator === 0) {
        return Math.hypot(pointVectorX, pointVectorZ)
      }

      const projectionFactor = clampValue(((pointVectorX * segmentVectorX) + (pointVectorZ * segmentVectorZ)) / projectionDenominator, 0, 1)
      const closestPointX = segmentStartPoint.x + (segmentVectorX * projectionFactor)
      const closestPointZ = segmentStartPoint.y + (segmentVectorZ * projectionFactor)
      return Math.hypot(samplePoint.x - closestPointX, samplePoint.y - closestPointZ)
    }

    function samplePolylineDistance(sampleX, sampleZ, polylinePoints) {
      const distanceQueryPoint = new THREE.Vector2(sampleX, sampleZ)
      let nearestDistance = Infinity

      for (let polylineSegmentIndex = 0; polylineSegmentIndex < polylinePoints.length - 1; polylineSegmentIndex += 1) {
        const segmentStartPoint = polylinePoints[polylineSegmentIndex]
        const segmentEndPoint = polylinePoints[polylineSegmentIndex + 1]
        const segmentDistance = distanceToLineSegment(distanceQueryPoint, segmentStartPoint, segmentEndPoint)
        if (segmentDistance < nearestDistance) {
          nearestDistance = segmentDistance
        }
      }

      return nearestDistance
    }

    function sampleTerrainHeight(sampleX, sampleZ) {
      const plateauDistance = Math.sqrt((sampleX / 78) ** 2 + ((sampleZ + 6) / 96) ** 2)
      const plateauMask = 1 - smoothstepValue(0.72, 1.06, plateauDistance)
      const innerPlateauDistance = Math.sqrt((sampleX / 55) ** 2 + ((sampleZ + 2) / 49) ** 2)
      const innerPlateauMask = 1 - smoothstepValue(0.58, 0.82, innerPlateauDistance)
      const outerPlainDistance = Math.sqrt((sampleX / 200) ** 2 + ((sampleZ / 205) ** 2))
      const hillsideNoise = ridgeNoise(sampleX, sampleZ)
      const secondaryNoise = ridgeNoise(sampleX * 0.61, sampleZ * 0.61)
      let terrainElevation = 2.4 + ((1 - clampValue(outerPlainDistance, 0, 1)) * 3.8)
      terrainElevation += plateauMask * 48.5
      terrainElevation += hillsideNoise * (0.35 + ((1 - plateauMask) * 0.2) + (plateauMask * 0.9))
      terrainElevation += secondaryNoise * (0.18 + plateauMask * 0.24)
      terrainElevation = THREE.MathUtils.lerp(terrainElevation, 58.4 + ridgeNoise(sampleX * 0.38, sampleZ * 0.38) * 0.42, innerPlateauMask)
      const cliffMask = smoothstepValue(0.74, 1.02, plateauDistance)
      terrainElevation -= cliffMask * (4.6 + Math.abs(hillsideNoise) * 0.9)
      return terrainElevation
    }

    function sampleTerrainSlope(sampleX, sampleZ) {
      const sampleOffset = 1.5
      const westHeight = sampleTerrainHeight(sampleX - sampleOffset, sampleZ)
      const eastHeight = sampleTerrainHeight(sampleX + sampleOffset, sampleZ)
      const southHeight = sampleTerrainHeight(sampleX, sampleZ - sampleOffset)
      const northHeight = sampleTerrainHeight(sampleX, sampleZ + sampleOffset)
      const slopeX = (eastHeight - westHeight) / (sampleOffset * 2)
      const slopeZ = (northHeight - southHeight) / (sampleOffset * 2)
      return Math.sqrt((slopeX * slopeX) + (slopeZ * slopeZ))
    }

    function sampleTerrainNormal(sampleX, sampleZ) {
      const sampleOffset = 1.4
      const westHeight = sampleTerrainHeight(sampleX - sampleOffset, sampleZ)
      const eastHeight = sampleTerrainHeight(sampleX + sampleOffset, sampleZ)
      const southHeight = sampleTerrainHeight(sampleX, sampleZ - sampleOffset)
      const northHeight = sampleTerrainHeight(sampleX, sampleZ + sampleOffset)
      return new THREE.Vector3(westHeight - eastHeight, sampleOffset * 2, southHeight - northHeight).normalize()
    }

    function createMarbleTextureSet() {
      const marbleCanvasSize = 256
      const marbleDiffuseCanvas = document.createElement('canvas')
      marbleDiffuseCanvas.width = marbleCanvasSize
      marbleDiffuseCanvas.height = marbleCanvasSize
      const marbleDiffuseContext = marbleDiffuseCanvas.getContext('2d')
      const marbleDiffuseImage = marbleDiffuseContext.createImageData(marbleCanvasSize, marbleCanvasSize)

      const marbleBumpCanvas = document.createElement('canvas')
      marbleBumpCanvas.width = marbleCanvasSize
      marbleBumpCanvas.height = marbleCanvasSize
      const marbleBumpContext = marbleBumpCanvas.getContext('2d')
      const marbleBumpImage = marbleBumpContext.createImageData(marbleCanvasSize, marbleCanvasSize)

      for (let marblePixelY = 0; marblePixelY < marbleCanvasSize; marblePixelY += 1) {
        for (let marblePixelX = 0; marblePixelX < marbleCanvasSize; marblePixelX += 1) {
          const marbleIndex = (marblePixelY * marbleCanvasSize + marblePixelX) * 4
          const normalizedX = marblePixelX / marbleCanvasSize
          const normalizedY = marblePixelY / marbleCanvasSize
          const veinSignal = Math.sin(normalizedX * 18.5 + normalizedY * 7.2 + Math.sin(normalizedY * 21.5) * 1.8)
          const cloudSignal = Math.sin((normalizedX * 41.3) + (normalizedY * 27.7)) * 0.5
            + Math.cos((normalizedX * 16.2) - (normalizedY * 33.7)) * 0.5
          const crystallineSignal = Math.sin((normalizedX + normalizedY) * 85.0) * 0.15
          const marbleValue = 236 + veinSignal * 4.8 + cloudSignal * 5.4 + crystallineSignal * 3.0
          const diffuseRed = clampValue(Math.round(marbleValue + 7), 0, 255)
          const diffuseGreen = clampValue(Math.round(marbleValue + 3), 0, 255)
          const diffuseBlue = clampValue(Math.round(marbleValue - 2), 0, 255)
          marbleDiffuseImage.data[marbleIndex] = diffuseRed
          marbleDiffuseImage.data[marbleIndex + 1] = diffuseGreen
          marbleDiffuseImage.data[marbleIndex + 2] = diffuseBlue
          marbleDiffuseImage.data[marbleIndex + 3] = 255

          const bumpValue = clampValue(Math.round(118 + veinSignal * 24 + cloudSignal * 18 + crystallineSignal * 14), 0, 255)
          marbleBumpImage.data[marbleIndex] = bumpValue
          marbleBumpImage.data[marbleIndex + 1] = bumpValue
          marbleBumpImage.data[marbleIndex + 2] = bumpValue
          marbleBumpImage.data[marbleIndex + 3] = 255
        }
      }

      marbleDiffuseContext.putImageData(marbleDiffuseImage, 0, 0)
      marbleBumpContext.putImageData(marbleBumpImage, 0, 0)

      const marbleDiffuseTexture = new THREE.CanvasTexture(marbleDiffuseCanvas)
      marbleDiffuseTexture.colorSpace = THREE.SRGBColorSpace
      marbleDiffuseTexture.wrapS = THREE.RepeatWrapping
      marbleDiffuseTexture.wrapT = THREE.RepeatWrapping
      marbleDiffuseTexture.anisotropy = viewportRenderer.capabilities.getMaxAnisotropy()

      const marbleBumpTexture = new THREE.CanvasTexture(marbleBumpCanvas)
      marbleBumpTexture.wrapS = THREE.RepeatWrapping
      marbleBumpTexture.wrapT = THREE.RepeatWrapping
      marbleBumpTexture.anisotropy = viewportRenderer.capabilities.getMaxAnisotropy()

      return {
        diffuseTexture: marbleDiffuseTexture,
        bumpTexture: marbleBumpTexture
      }
    }

    const marbleTextureSet = createMarbleTextureSet()
    marbleTextureSet.diffuseTexture.repeat.set(3.5, 2.4)
    marbleTextureSet.bumpTexture.repeat.set(3.5, 2.4)

    const marbleMaterial = new THREE.MeshStandardMaterial({
      color: 0xf2e6d0,
      map: marbleTextureSet.diffuseTexture,
      bumpMap: marbleTextureSet.bumpTexture,
      bumpScale: 0.08,
      roughness: 0.82,
      metalness: 0.0
    })

    const roofMarbleMaterial = new THREE.MeshStandardMaterial({
      color: 0xe6d8bf,
      map: marbleTextureSet.diffuseTexture,
      bumpMap: marbleTextureSet.bumpTexture,
      bumpScale: 0.06,
      roughness: 0.88,
      metalness: 0.0
    })

    const terrainGeometry = new THREE.PlaneGeometry(460, 460, 170, 170)
    terrainGeometry.rotateX(-Math.PI / 2)
    const terrainPositionAttribute = terrainGeometry.attributes.position
    const terrainVertexColorValues = []

    for (let terrainVertexIndex = 0; terrainVertexIndex < terrainPositionAttribute.count; terrainVertexIndex += 1) {
      const terrainVertexX = terrainPositionAttribute.getX(terrainVertexIndex)
      const terrainVertexZ = terrainPositionAttribute.getZ(terrainVertexIndex)
      const terrainVertexElevation = sampleTerrainHeight(terrainVertexX, terrainVertexZ)
      terrainPositionAttribute.setY(terrainVertexIndex, terrainVertexElevation)

      const terrainPlateauDistance = Math.sqrt((terrainVertexX / 82) ** 2 + ((terrainVertexZ + 7) / 100) ** 2)
      const terrainPlateauMask = 1 - smoothstepValue(0.74, 1.1, terrainPlateauDistance)
      const terrainPathDistance = samplePolylineDistance(terrainVertexX, terrainVertexZ, ascentPolylinePoints)
      const terrainPathMask = 1 - smoothstepValue(4, 14, terrainPathDistance)
      const terrainSlopeValue = sampleTerrainSlope(terrainVertexX, terrainVertexZ)
      const terrainSlopeMask = smoothstepValue(0.55, 2.2, terrainSlopeValue)
      const terraceDustMask = 1 - smoothstepValue(0.58, 0.85, Math.sqrt((terrainVertexX / 62) ** 2 + ((terrainVertexZ + 2) / 58) ** 2))

      const redChannel = clampValue(0.46 + terrainPlateauMask * 0.18 + terrainPathMask * 0.16 + terraceDustMask * 0.05 + terrainSlopeMask * 0.07, 0, 1)
      const greenChannel = clampValue(0.40 + terrainPlateauMask * 0.18 + terrainPathMask * 0.13 + terraceDustMask * 0.04 + terrainSlopeMask * 0.05, 0, 1)
      const blueChannel = clampValue(0.31 + terrainPlateauMask * 0.14 + terrainPathMask * 0.08 + terraceDustMask * 0.03 + terrainSlopeMask * 0.04, 0, 1)

      terrainVertexColorValues.push(redChannel, greenChannel, blueChannel)
    }

    terrainGeometry.setAttribute('color', new THREE.Float32BufferAttribute(terrainVertexColorValues, 3))
    terrainGeometry.computeVertexNormals()

    const terrainMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.98,
      metalness: 0.0,
      vertexColors: true
    })

    const terrainMesh = new THREE.Mesh(terrainGeometry, terrainMaterial)
    terrainMesh.receiveShadow = true
    terrainGroup.add(terrainMesh)

    const lowerGroundGeometry = new THREE.CircleGeometry(360, 64)
    lowerGroundGeometry.rotateX(-Math.PI / 2)
    const lowerGroundMaterial = new THREE.MeshStandardMaterial({ color: 0x8b775e, roughness: 1, metalness: 0 })
    const lowerGroundMesh = new THREE.Mesh(lowerGroundGeometry, lowerGroundMaterial)
    lowerGroundMesh.position.y = 1.9
    lowerGroundMesh.receiveShadow = true
    terrainGroup.add(lowerGroundMesh)

    function createFlutedColumnGeometry(columnHeight, lowerRadius, upperRadius) {
      const shaftGeometry = new THREE.CylinderGeometry(upperRadius, lowerRadius, columnHeight, 24, 14, true)
      const shaftPositionAttribute = shaftGeometry.attributes.position

      for (let shaftVertexIndex = 0; shaftVertexIndex < shaftPositionAttribute.count; shaftVertexIndex += 1) {
        const shaftVertexY = shaftPositionAttribute.getY(shaftVertexIndex)
        const shaftVertexX = shaftPositionAttribute.getX(shaftVertexIndex)
        const shaftVertexZ = shaftPositionAttribute.getZ(shaftVertexIndex)
        const shaftRadialDistance = Math.sqrt((shaftVertexX * shaftVertexX) + (shaftVertexZ * shaftVertexZ))

        if (shaftRadialDistance > 0.001) {
          const shaftAngle = Math.atan2(shaftVertexZ, shaftVertexX)
          const fluteDepth = Math.cos(shaftAngle * 12) * 0.085
          const entasisFactor = Math.sin(((shaftVertexY / columnHeight) + 0.5) * Math.PI) * 0.05
          const adjustedRadius = shaftRadialDistance + fluteDepth + entasisFactor
          shaftPositionAttribute.setX(shaftVertexIndex, (shaftVertexX / shaftRadialDistance) * adjustedRadius)

        const slabPitch = Math.atan2(nextElevation - slabElevation, slabPoint.distanceTo(nextPoint))
        const slabWidthScale = 1 + (1 - smoothstepValue(0, 0.3, pathProgress)) * 0.2
        const slabDepthScale = 0.92 + Math.sin(pathProgress * Math.PI) * 0.16
        const slabStepBoost = slabIndex % 5 === 0 ? 0.16 : 0
        sharedTemporaryEuler.set(slabPitch * 0.72, Math.atan2(slabTangent.x, slabTangent.z), 0, 'YXZ')
        sharedTemporaryQuaternion.setFromEuler(sharedTemporaryEuler)
        sharedTemporaryScale.set(slabWidthScale, 1 + slabStepBoost, slabDepthScale)

    const desiredCameraPosition = postcardCameraPosition.clone()
    const desiredCameraTarget = postcardCameraTarget.clone()
    const transitionStartPosition = mainCamera.position.clone()
    const transitionStartTarget = orbitController.target.clone()
    let presetTransitionProgress = 1
    let activeCameraMode = 'postcard'

    const flyoverCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-186, 86, 222),
      new THREE.Vector3(-136, 102, 132),
      new THREE.Vector3(-52, 94, 68),
      new THREE.Vector3(74, 82, 132),
      new THREE.Vector3(152, 104, 48),
      new THREE.Vector3(84, 130, -82),
      new THREE.Vector3(-64, 108, -58),
      new THREE.Vector3(-186, 86, 222)
    ], true, 'centripetal')

    function startCameraTransition(cameraModeName) {
      const previousCameraMode = activeCameraMode
      activeCameraMode = cameraModeName
      cameraValueElement.textContent = cameraModeName === 'flyover' ? 'Path' : 'View'
      transitionStartPosition.copy(mainCamera.position)
      if (previousCameraMode === 'flyover') {
        transitionStartTarget.set(4, 68, 0)
        orbitController.target.copy(transitionStartTarget)
      } else {
        transitionStartTarget.copy(orbitController.target)
      }
      presetTransitionProgress = 0

      if (cameraModeName === 'postcard') {
        desiredCameraPosition.copy(postcardCameraPosition)
        desiredCameraTarget.copy(postcardCameraTarget)
        orbitController.enabled = true
      } else if (cameraModeName === 'inspection') {
        desiredCameraPosition.copy(inspectionCameraPosition)
        desiredCameraTarget.copy(inspectionCameraTarget)
        orbitController.enabled = true
      } else {
        orbitController.enabled = false
      }
    }

    function evaluateTimePalette(timeValue) {
      const morningPosition = new THREE.Vector3(148, 74, 88)
      const noonPosition = new THREE.Vector3(42, 178, 24)
      const eveningPosition = new THREE.Vector3(-146, 68, 92)
      const resolvedSunPosition = new THREE.Vector3()
      const resolvedSunColor = new THREE.Color()
      const resolvedSkyTopColor = new THREE.Color()
      const resolvedSkyHorizonColor = new THREE.Color()
      const resolvedFogColor = new THREE.Color()
      const resolvedGroundColor = new THREE.Color()

      if (timeValue <= 0.5) {
        const morningBlend = timeValue / 0.5
        resolvedSunPosition.lerpVectors(morningPosition, noonPosition, morningBlend)
        resolvedSunColor.lerpColors(new THREE.Color(0xffd0a1), new THREE.Color(0xfff6e3), morningBlend)
        resolvedSkyTopColor.lerpColors(new THREE.Color(0x6ea7ee), new THREE.Color(0x72b0ff), morningBlend)
        resolvedSkyHorizonColor.lerpColors(new THREE.Color(0xf1d8b6), new THREE.Color(0xd7e8ff), morningBlend)
        resolvedFogColor.lerpColors(new THREE.Color(0xd8c4ac), new THREE.Color(0xb9cfe8), morningBlend)
        resolvedGroundColor.lerpColors(new THREE.Color(0xf0d6b7), new THREE.Color(0xf4e6d0), morningBlend)
        return {
          sunPosition: resolvedSunPosition,
          sunColor: resolvedSunColor,
          skyTopColor: resolvedSkyTopColor,
          skyHorizonColor: resolvedSkyHorizonColor,
          fogColor: resolvedFogColor,
          groundColor: resolvedGroundColor,
          sunIntensity: THREE.MathUtils.lerp(2.2, 2.9, morningBlend),
          hemisphereIntensity: THREE.MathUtils.lerp(1.42, 1.68, morningBlend),
          fillIntensity: THREE.MathUtils.lerp(0.2, 0.27, morningBlend),
          exposure: THREE.MathUtils.lerp(1.02, 1.1, morningBlend),
          shadowRadius: THREE.MathUtils.lerp(2.3, 1.1, morningBlend),
          stageLabel: morningBlend < 0.62 ? 'Morning' : 'High noon'
        }
      }

      const eveningBlend = (timeValue - 0.5) / 0.5
      resolvedSunPosition.lerpVectors(noonPosition, eveningPosition, eveningBlend)
      resolvedSunColor.lerpColors(new THREE.Color(0xfff6e3), new THREE.Color(0xffc184), eveningBlend)
      resolvedSkyTopColor.lerpColors(new THREE.Color(0x72b0ff), new THREE.Color(0x5f93d5), eveningBlend)
      resolvedSkyHorizonColor.lerpColors(new THREE.Color(0xd7e8ff), new THREE.Color(0xf2c596), eveningBlend)
      resolvedFogColor.lerpColors(new THREE.Color(0xb9cfe8), new THREE.Color(0xe0b891), eveningBlend)
      resolvedGroundColor.lerpColors(new THREE.Color(0xf4e6d0), new THREE.Color(0xf1cfaa), eveningBlend)
      return {
        sunPosition: resolvedSunPosition,
        sunColor: resolvedSunColor,
        skyTopColor: resolvedSkyTopColor,
        skyHorizonColor: resolvedSkyHorizonColor,
        fogColor: resolvedFogColor,
        groundColor: resolvedGroundColor,
        sunIntensity: THREE.MathUtils.lerp(2.9, 2.35, eveningBlend),
        hemisphereIntensity: THREE.MathUtils.lerp(1.68, 1.3, eveningBlend),
        fillIntensity: THREE.MathUtils.lerp(0.27, 0.18, eveningBlend),
        exposure: THREE.MathUtils.lerp(1.1, 1.06, eveningBlend),
        shadowRadius: THREE.MathUtils.lerp(1.1, 2.5, eveningBlend),
        stageLabel: eveningBlend < 0.38 ? 'High noon' : 'Golden hour'
      }
    }

    function applyAtmosphereFromUi() {
      const timeValue = Number(timeSliderElement.value)
      const hazeValue = Number(hazeSliderElement.value)
      const paletteData = evaluateTimePalette(timeValue)
      timeValueElement.textContent = paletteData.stageLabel
      hazeValueElement.textContent = `${Math.round(hazeValue * 100)}%`

      sunLight.position.copy(paletteData.sunPosition)
      sunLight.color.copy(paletteData.sunColor)
      sunLight.intensity = paletteData.sunIntensity
      sunLight.shadow.radius = paletteData.shadowRadius
      fillLight.intensity = paletteData.fillIntensity
      hemisphereLight.intensity = paletteData.hemisphereIntensity
      hemisphereLight.color.copy(paletteData.skyTopColor)
      hemisphereLight.groundColor.copy(paletteData.groundColor)
      viewportRenderer.toneMappingExposure = paletteData.exposure

      const fogNearDistance = THREE.MathUtils.lerp(210, 115, hazeValue)
      const fogFarDistance = THREE.MathUtils.lerp(520, 240, hazeValue)
      acropolisScene.fog.near = fogNearDistance
      acropolisScene.fog.far = fogFarDistance
      acropolisScene.fog.color.copy(paletteData.fogColor)
      acropolisScene.background.copy(paletteData.fogColor)

      skyUniforms.topColor.value.copy(paletteData.skyTopColor)
      skyUniforms.horizonColor.value.lerpColors(paletteData.skyHorizonColor, paletteData.fogColor, hazeValue * 0.25)
      skyUniforms.groundColor.value.copy(paletteData.groundColor)
    }

    timeSliderElement.addEventListener('input', applyAtmosphereFromUi)
    hazeSliderElement.addEventListener('input', applyAtmosphereFromUi)
    crowdCheckboxElement.addEventListener('input', updateCrowdVisibility)
    crowdDensitySliderElement.addEventListener('input', updateCrowdVisibility)
    cameraSelectElement.addEventListener('change', function handleCameraSelection() {
      startCameraTransition(cameraSelectElement.value)
    })

    function handleResize() {
      mainCamera.aspect = window.innerWidth / window.innerHeight
      mainCamera.updateProjectionMatrix()
      viewportRenderer.setSize(window.innerWidth, window.innerHeight)
      viewportRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    }

    window.addEventListener('resize', handleResize)

    const renderClock = new THREE.Clock()
    const fpsSamples = []
    let fpsAccumulatedTime = 0

    function updatePostcardOrInspection(deltaTime) {
      if (presetTransitionProgress < 1) {
        presetTransitionProgress = Math.min(1, presetTransitionProgress + deltaTime * 0.75)
        const easedProgress = 1 - Math.pow(1 - presetTransitionProgress, 3)
        mainCamera.position.lerpVectors(transitionStartPosition, desiredCameraPosition, easedProgress)
        orbitController.target.lerpVectors(transitionStartTarget, desiredCameraTarget, easedProgress)
      }
      orbitController.update()
    }

    function updateFlyover(elapsedTime) {
      const flyoverProgress = (elapsedTime * 0.025) % 1
      const lookAheadProgress = (flyoverProgress + 0.026) % 1
      const flyoverPosition = flyoverCurve.getPointAt(flyoverProgress)
      const flyoverLookAheadPoint = flyoverCurve.getPointAt(lookAheadProgress)
      const templeFocusPoint = new THREE.Vector3(4, 68, 0)
      const resolvedLookPoint = flyoverLookAheadPoint.lerp(templeFocusPoint, 0.62)
      mainCamera.position.copy(flyoverPosition)
      mainCamera.lookAt(resolvedLookPoint)
    }

    function updateFpsCounter(deltaTime) {
      fpsAccumulatedTime += deltaTime
      fpsSamples.push(1 / Math.max(deltaTime, 0.0001))
      if (fpsSamples.length > 24) {
        fpsSamples.shift()
      }
      if (fpsAccumulatedTime >= 0.35) {
        const fpsAverage = fpsSamples.reduce(function accumulateSample(previousTotal, currentSample) {
          return previousTotal + currentSample
        }, 0) / fpsSamples.length
        fpsBadgeElement.textContent = `FPS ${Math.round(fpsAverage)}`
        fpsAccumulatedTime = 0
      }
    }

    applyAtmosphereFromUi()
    updateCrowdVisibility()
    startCameraTransition('postcard')

    function animateScene() {
      requestAnimationFrame(animateScene)
      const deltaTime = renderClock.getDelta()
      const elapsedTime = renderClock.elapsedTime

      if (activeCameraMode === 'flyover') {
        updateFlyover(elapsedTime)
      } else {
        updatePostcardOrInspection(deltaTime)
      }

      updateFpsCounter(deltaTime)
      viewportRenderer.render(acropolisScene, mainCamera)
    }

    animateScene()
  </script>
</body>
</html>
