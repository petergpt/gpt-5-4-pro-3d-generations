<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Gate Bay Atmosphere</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(7, 12, 18, 0.72);
      --panel-border: rgba(255, 255, 255, 0.14);
      --accent: #f0b35a;
      --text: #eef4fb;
      --muted: #a7b4c6;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: var(--text);
    }

    #app-root {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }

    #ui-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: min(360px, calc(100vw - 32px));
      padding: 14px 14px 12px;
      border-radius: 16px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      z-index: 10;
      user-select: none;
    }

    #ui-panel h1 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .control-row label {
      font-size: 13px;
      color: var(--text);
    }

    .value-chip {
      min-width: 56px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      margin: 6px 0 0;
      accent-color: var(--accent);
    }

    select,
    button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 10px 12px;
      font-size: 13px;
    }

    button {
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      color: rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.04);
    }

    #button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    #readout {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .readout-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .readout-line strong {
      color: var(--text);
      font-weight: 600;
    }

    #hint {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(220, 230, 244, 0.72);
    }

    @media (max-width: 700px) {
      #ui-panel {
        width: min(100vw - 20px, 340px);
        top: 10px;
        left: 10px;
      }

      #button-grid {
        grid-template-columns: 1fr;
      }

      #readout {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app-root"></div>
  <div id="ui-panel">
    <h1>Golden Gate Bay Atmosphere</h1>

    <div class="control-row">
      <label for="fog-slider">Fog bank</label>
      <span class="value-chip" id="fog-value">38%</span>
    </div>
    <input id="fog-slider" type="range" min="0" max="100" step="1" value="38" />

    <div class="control-row">
      <label for="traffic-slider">Traffic density</label>
      <span class="value-chip" id="traffic-value">62%</span>
    </div>
    <input id="traffic-slider" type="range" min="0" max="100" step="1" value="62" />

    <div class="control-row">
      <label for="wave-slider">Water waves</label>
      <span class="value-chip" id="wave-value">52%</span>
    </div>
    <input id="wave-slider" type="range" min="0" max="100" step="1" value="52" />

    <div class="control-row">
      <label for="weather-select">Weather</label>
      <span class="value-chip" id="weather-value">Marine layer</span>
    </div>
    <select id="weather-select">
      <option value="clear">Clear</option>
      <option value="marine" selected>Marine layer</option>
      <option value="overcast">Overcast</option>
      <option value="stormy">Stormy</option>
    </select>

    <div class="control-row">
      <label for="time-slider">Time of day</label>
      <span class="value-chip" id="time-value">Afternoon</span>
    </div>
    <input id="time-slider" type="range" min="0" max="100" step="1" value="48" />

    <div id="button-grid">
      <button id="comet-button" disabled title="Available at night">Launch comet</button>
      <button id="whales-button">Spawn whales</button>
    </div>

    <div id="readout">
      <div class="readout-line"><span>Fog</span><strong id="readout-fog">38%</strong></div>
      <div class="readout-line"><span>Traffic</span><strong id="readout-traffic">62%</strong></div>
      <div class="readout-line"><span>Waves</span><strong id="readout-waves">52%</strong></div>
      <div class="readout-line"><span>Whales</span><strong id="readout-whales">0</strong></div>
      <div class="readout-line"><span>Time</span><strong id="readout-time">Afternoon</strong></div>
      <div class="readout-line"><span>Weather</span><strong id="readout-weather">Marine layer</strong></div>
    </div>

    <div id="hint">Orbit to inspect the bridge, pan across the Presidio and Marin hills, and dolly toward the traffic, water, whales, or skyline.</div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const readoutFogElement = document.getElementById('readout-fog');

    const readoutWhalesElement = document.getElementById('readout-whales');
    const readoutTimeElement = document.getElementById('readout-time');
    const readoutWeatherElement = document.getElementById('readout-weather');

    const renderer = new THREE.WebGLRenderer({
      antialias: true,

      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    appRoot.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 2400);
    camera.position.set(-120, 62, 150);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 40;
    controls.maxDistance = 460;
    controls.maxPolarAngle = Math.PI * 0.485;
    controls.target.set(0, 24, 0);
    controls.screenSpacePanning = false;

    const clock = new THREE.Clock();
    const tempVectorA = new THREE.Vector3();
    const tempVectorB = new THREE.Vector3();
    const tempVectorC = new THREE.Vector3();
    const tempVectorD = new THREE.Vector3();
    const tempVectorE = new THREE.Vector3();
    const tempVectorF = new THREE.Vector3();
    const tempQuaternionA = new THREE.Quaternion();
    const tempEulerA = new THREE.Euler();
    const tempMatrixA = new THREE.Matrix4();
    const tempMatrixB = new THREE.Matrix4();
    const tempColorA = new THREE.Color();
    const tempColorB = new THREE.Color();

    const environmentState = {
      fogPercent: Number(fogSliderElement.value),
      trafficPercent: Number(trafficSliderElement.value),
      wavePercent: Number(waveSliderElement.value),
      weatherKey: weatherSelectElement.value,

    const sceneMetrics = {

      towerTop: 68,
      towerHalfSpanX: 55,
      anchorageHalfSpanX: 128,
      routeHalfLength: 360,
      deckWidth: 13.8,
      roadWidth: 10.6,
      cableOffsetZ: 6.4,
      cableSagCenter: 49.5,
      cableTowerHeight: 68,
      cableAnchorageHeight: 28,
      waterLevel: 0
    };

    const weatherProfiles = {
      clear: {
        label: 'Clear',
        cloudCoverage: 0.18,
        cloudOpacity: 0.22,
        cloudDarkness: 0.08,
        cloudFloor: 0.12,
        cloudCeil: 0.86,
        horizonHaze: 0.18,
        fogBias: 0.02,
        skyCool: 0.0,
        sunStrength: 1.35,
        ambientStrength: 0.5,
        moonStrength: 0.2,
        storminess: 0.0,
        rainAmount: 0.0,
        waveBias: 0.0,
        trafficSlowdown: 1.0,
        shadowSoftness: 0.72,
        wetness: 0.0
      },
      marine: {
        label: 'Marine layer',
        cloudCoverage: 0.46,
        cloudOpacity: 0.34,
        cloudDarkness: 0.16,
        cloudFloor: -0.03,
        cloudCeil: 0.48,
        horizonHaze: 0.46,
        fogBias: 0.34,
        skyCool: 0.26,
        sunStrength: 1.05,
        ambientStrength: 0.62,
        moonStrength: 0.24,
        storminess: 0.12,
        rainAmount: 0.0,
        waveBias: 0.08,
        trafficSlowdown: 0.95,
        shadowSoftness: 0.82,
        wetness: 0.08
      },
      overcast: {
        label: 'Overcast',
        cloudCoverage: 0.84,
        cloudOpacity: 0.68,
        cloudDarkness: 0.34,
        cloudFloor: -0.02,
        cloudCeil: 0.92,
        horizonHaze: 0.32,
        fogBias: 0.2,
        skyCool: 0.42,
        sunStrength: 0.72,
        ambientStrength: 0.8,
        moonStrength: 0.26,
        storminess: 0.26,
        rainAmount: 0.0,
        waveBias: 0.16,
        trafficSlowdown: 0.88,
        shadowSoftness: 0.92,
        wetness: 0.15
      },
      stormy: {
        label: 'Stormy',
        cloudCoverage: 0.96,
        cloudOpacity: 0.84,
        cloudDarkness: 0.62,
        cloudFloor: -0.06,
        cloudCeil: 0.95,
        horizonHaze: 0.24,
        fogBias: 0.26,
        skyCool: 0.52,
        sunStrength: 0.38,
        ambientStrength: 0.56,
        moonStrength: 0.3,
        storminess: 0.9,
        rainAmount: 1.0,
        waveBias: 0.42,
        trafficSlowdown: 0.68,
        shadowSoftness: 0.98,
        wetness: 0.95
      }

    const currentLightingState = {
      dayFactor: 0,
      nightFactor: 0,
      twilightFactor: 0,
      wetness: 0,
      fogDensity: 0,
      rainAmount: 0,
      storminess: 0,
      waveStrength: 0,
      sunDirection: new THREE.Vector3(),
      moonDirection: new THREE.Vector3(),
      timeLabel: 'Afternoon'
    };

    function createSoftParticleTexture(textureSize = 128) {
      const canvasElement = document.createElement('canvas');
      canvasElement.width = textureSize;
      canvasElement.height = textureSize;
      const canvasContext = canvasElement.getContext('2d');
      const radialGradient = canvasContext.createRadialGradient(
        textureSize * 0.48,
        textureSize * 0.48,
        textureSize * 0.08,
        textureSize * 0.5,
        textureSize * 0.5,
        textureSize * 0.5
      );
      radialGradient.addColorStop(0.0, 'rgba(255,255,255,1.0)');
      radialGradient.addColorStop(0.24, 'rgba(255,255,255,0.85)');
      radialGradient.addColorStop(0.58, 'rgba(255,255,255,0.32)');
      radialGradient.addColorStop(1.0, 'rgba(255,255,255,0.0)');
      canvasContext.fillStyle = radialGradient;
      canvasContext.fillRect(0, 0, textureSize, textureSize);
      const imageData = canvasContext.getImageData(0, 0, textureSize, textureSize);
      for (let pixelIndex = 0; pixelIndex < imageData.data.length; pixelIndex += 4) {
        const noiseValue = 0.82 + Math.random() * 0.18;
        imageData.data[pixelIndex + 3] *= noiseValue;
      }
      canvasContext.putImageData(imageData, 0, 0);
      const texture = new THREE.CanvasTexture(canvasElement);
      texture.needsUpdate = true;
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      return texture;
    }

    function createWindowTexture() {
      const canvasElement = document.createElement('canvas');
      canvasElement.width = 256;
      canvasElement.height = 512;
      const canvasContext = canvasElement.getContext('2d');
      canvasContext.fillStyle = '#1c2330';
      canvasContext.fillRect(0, 0, canvasElement.width, canvasElement.height);
      for (let rowIndex = 0; rowIndex < 44; rowIndex += 1) {
        for (let columnIndex = 0; columnIndex < 18; columnIndex += 1) {
          const brightnessValue = 140 + Math.floor(Math.random() * 100);
          const alphaValue = 0.16 + Math.random() * 0.42;
          canvasContext.fillStyle = `rgba(${brightnessValue}, ${brightnessValue - 8}, ${brightnessValue - 18}, ${alphaValue})`;
          canvasContext.fillRect(8 + columnIndex * 13, 8 + rowIndex * 11, 6, 6);
        }
      }
      const texture = new THREE.CanvasTexture(canvasElement);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1.4, 2.6);
      return texture;
    }

    function createLinearGlowTexture() {
      const canvasElement = document.createElement('canvas');
      canvasElement.width = 64;
      canvasElement.height = 256;
      const canvasContext = canvasElement.getContext('2d');
      const linearGradient = canvasContext.createLinearGradient(32, 0, 32, 256);
      linearGradient.addColorStop(0.0, 'rgba(255,255,255,0.0)');
      linearGradient.addColorStop(0.15, 'rgba(255,235,185,0.08)');
      linearGradient.addColorStop(0.45, 'rgba(255,220,148,0.34)');
      linearGradient.addColorStop(0.8, 'rgba(255,176,86,0.86)');
      linearGradient.addColorStop(1.0, 'rgba(255,148,58,1.0)');
      canvasContext.fillStyle = linearGradient;
      canvasContext.fillRect(0, 0, canvasElement.width, canvasElement.height);
      const texture = new THREE.CanvasTexture(canvasElement);
      texture.needsUpdate = true;
      return texture;
    }

    function createWakeTexture() {
      const canvasElement = document.createElement('canvas');
      canvasElement.width = 256;
      canvasElement.height = 256;
      const canvasContext = canvasElement.getContext('2d');
      canvasContext.clearRect(0, 0, 256, 256);
      const radialGradient = canvasContext.createRadialGradient(128, 160, 14, 128, 128, 116);
      radialGradient.addColorStop(0.0, 'rgba(255,255,255,0.44)');
      radialGradient.addColorStop(0.6, 'rgba(255,255,255,0.12)');
      radialGradient.addColorStop(1.0, 'rgba(255,255,255,0.0)');
      canvasContext.fillStyle = radialGradient;
      canvasContext.beginPath();
      canvasContext.ellipse(128, 140, 100, 80, 0, 0, Math.PI * 2);
      canvasContext.fill();
      const texture = new THREE.CanvasTexture(canvasElement);
      texture.needsUpdate = true;
      return texture;
    }

    const softParticleTexture = createSoftParticleTexture(128);
    const windowTexture = createWindowTexture();
    const cometTailTexture = createLinearGlowTexture();
    const wakeTexture = createWakeTexture();

    function fractionalNoise2D(coordinateX, coordinateY) {
      const sineValue = Math.sin(coordinateX * 12.9898 + coordinateY * 78.233) * 43758.5453123;
      return sineValue - Math.floor(sineValue);
    }

    function smoothStepRange(edgeStart, edgeEnd, value) {
      const normalizedValue = THREE.MathUtils.clamp((value - edgeStart) / (edgeEnd - edgeStart), 0, 1);
      return normalizedValue * normalizedValue * (3 - 2 * normalizedValue);
    }

    function sampleValueNoise(coordinateX, coordinateY) {
      const cellX = Math.floor(coordinateX);
      const cellY = Math.floor(coordinateY);
      const fractX = coordinateX - cellX;
      const fractY = coordinateY - cellY;
      const cornerA = fractionalNoise2D(cellX, cellY);
      const cornerB = fractionalNoise2D(cellX + 1, cellY);
      const cornerC = fractionalNoise2D(cellX, cellY + 1);
      const cornerD = fractionalNoise2D(cellX + 1, cellY + 1);
      const blendX = fractX * fractX * (3 - 2 * fractX);
      const blendY = fractY * fractY * (3 - 2 * fractY);
      const horizontalA = THREE.MathUtils.lerp(cornerA, cornerB, blendX);
      const horizontalB = THREE.MathUtils.lerp(cornerC, cornerD, blendX);
      return THREE.MathUtils.lerp(horizontalA, horizontalB, blendY);
    }

    function sampleFractalNoise(coordinateX, coordinateY) {
      let accumulatedValue = 0;
      let amplitudeValue = 0.5;
      let frequencyValue = 1.0;
      for (let octaveIndex = 0; octaveIndex < 4; octaveIndex += 1) {
        accumulatedValue += sampleValueNoise(coordinateX * frequencyValue, coordinateY * frequencyValue) * amplitudeValue;
        frequencyValue *= 2.03;
        amplitudeValue *= 0.5;
      }
      return accumulatedValue;
    }

    function leftCoastlineX(worldZ) {
      return -72 - Math.sin(worldZ * 0.018) * 16 - Math.cos(worldZ * 0.048) * 8 - Math.exp(-(((worldZ + 120) / 90) ** 2)) * 21 + Math.exp(-(((worldZ - 160) / 110) ** 2)) * 12;
    }

    function rightCoastlineX(worldZ) {
      return 74 + Math.sin(worldZ * 0.02) * 14 + Math.cos(worldZ * 0.043) * 10 + Math.exp(-(((worldZ - 80) / 100) ** 2)) * 18 - Math.exp(-(((worldZ + 140) / 120) ** 2)) * 10;
    }

    function sampleLeftTerrainHeight(worldX, worldZ) {
      const coastX = leftCoastlineX(worldZ);
      const inlandDistance = Math.max(0, coastX - worldX);
      if (inlandDistance <= 0) {
        return 0.22;
      }
      const broadNoise = sampleFractalNoise((worldX + 420) * 0.012, (worldZ + 420) * 0.012);
      const fineNoise = sampleFractalNoise((worldX + 420) * 0.042, (worldZ + 420) * 0.042);
      let heightValue = smoothStepRange(0, 28, inlandDistance) * 2.8;
      heightValue += broadNoise * 16.0;
      heightValue += fineNoise * 3.0;
      heightValue += Math.exp(-((((worldX + 188) / 110) ** 2) + (((worldZ + 24) / 146) ** 2))) * 28;
      heightValue += Math.exp(-((((worldX + 254) / 120) ** 2) + (((worldZ - 150) / 132) ** 2))) * 22;
      heightValue += Math.exp(-((((worldX + 304) / 160) ** 2) + (((worldZ + 182) / 160) ** 2))) * 18;
      const roadCut = Math.exp(-(((worldZ) / 15) ** 2)) * Math.exp(-(((worldX + 152) / 95) ** 2)) * 7;
      heightValue -= roadCut;
      return Math.max(0.22, heightValue);
    }

    function sampleRightTerrainHeight(worldX, worldZ) {
      const coastX = rightCoastlineX(worldZ);
      const inlandDistance = Math.max(0, worldX - coastX);
      if (inlandDistance <= 0) {
        return 0.22;
      }
      const broadNoise = sampleFractalNoise((worldX + 500) * 0.011, (worldZ + 380) * 0.011);
      const fineNoise = sampleFractalNoise((worldX + 500) * 0.046, (worldZ + 380) * 0.046);
      let heightValue = smoothStepRange(0, 26, inlandDistance) * 3.4;
      heightValue += broadNoise * 15.0;
      heightValue += fineNoise * 3.4;
      heightValue += Math.exp(-((((worldX - 196) / 112) ** 2) + (((worldZ - 34) / 148) ** 2))) * 31;
      heightValue += Math.exp(-((((worldX - 264) / 124) ** 2) + (((worldZ + 138) / 140) ** 2))) * 24;
      heightValue += Math.exp(-((((worldX - 306) / 164) ** 2) + (((worldZ - 176) / 162) ** 2))) * 20;
      const roadCut = Math.exp(-(((worldZ) / 16) ** 2)) * Math.exp(-(((worldX - 150) / 98) ** 2)) * 8;
      heightValue -= roadCut;
      return Math.max(0.22, heightValue);
    }

    function sampleTerrainHeight(worldX, worldZ) {
      if (worldX < 0) {
        return sampleLeftTerrainHeight(worldX, worldZ);
      }
      return sampleRightTerrainHeight(worldX, worldZ);
    }

    function sampleWaterHeight(worldX, worldZ, elapsedSeconds) {
      const baseWaveStrength = THREE.MathUtils.lerp(0.18, 1.0, currentLightingState.waveStrength);
      const stormBoost = currentLightingState.storminess * 0.5;
      const amplitudeValue = (0.22 + baseWaveStrength * 1.14 + stormBoost * 0.55) * 0.54;
      const frequencyValue = THREE.MathUtils.lerp(0.82, 1.9, currentLightingState.waveStrength + currentLightingState.storminess * 0.16);
      const choppyValue = THREE.MathUtils.lerp(0.1, 0.82, currentLightingState.waveStrength + currentLightingState.storminess * 0.15);
      let heightValue = 0;
      heightValue += Math.sin((worldX * 0.046 + worldZ * 0.018) * frequencyValue + elapsedSeconds * 0.82) * 1.18;
      heightValue += Math.sin((worldX * -0.026 + worldZ * 0.066) * frequencyValue + elapsedSeconds * 1.12) * 0.7;
      heightValue += Math.sin((worldX * 0.014 + worldZ * 0.15) * frequencyValue + elapsedSeconds * 1.56) * 0.3;
      heightValue += (sampleValueNoise(worldX * 0.09 + elapsedSeconds * 0.02, worldZ * 0.09 - elapsedSeconds * 0.016) - 0.5) * 0.84 * choppyValue;
      heightValue += (sampleValueNoise(worldX * 0.22 - elapsedSeconds * 0.05, worldZ * 0.18 + elapsedSeconds * 0.036) - 0.5) * 0.4 * choppyValue;
      return heightValue * amplitudeValue;
    }

    function buildTerrainGeometry(sideKey) {
      const terrainWidth = 420;
      const terrainDepth = 760;
      const terrainGeometry = new THREE.PlaneGeometry(terrainWidth, terrainDepth, 180, 260);
      terrainGeometry.rotateX(-Math.PI / 2);
      const positionsAttribute = terrainGeometry.attributes.position;
      const colorsArray = new Float32Array(positionsAttribute.count * 3);
      for (let vertexIndex = 0; vertexIndex < positionsAttribute.count; vertexIndex += 1) {
        let worldX = positionsAttribute.getX(vertexIndex);
        const worldZ = positionsAttribute.getZ(vertexIndex);
        if (sideKey === 'left') {
          worldX -= 235;
        } else {
          worldX += 235;
        }
        const worldY = sideKey === 'left'
          ? sampleLeftTerrainHeight(worldX, worldZ)
          : sampleRightTerrainHeight(worldX, worldZ);
        positionsAttribute.setXYZ(vertexIndex, worldX, worldY, worldZ);

        const shorelineFactor = smoothStepRange(0.22, 6.5, worldY);
        const elevationFactor = THREE.MathUtils.clamp(worldY / 56, 0, 1);
        const dryGrassFactor = smoothStepRange(0.2, 0.92, elevationFactor);
        tempColorA.setRGB(0.16, 0.23, 0.16);
        tempColorB.setRGB(0.45, 0.47, 0.29);
        tempColorA.lerp(tempColorB, dryGrassFactor * 0.72);
        const lowlandTint = new THREE.Color(0.1, 0.24, 0.18);
        tempColorA.lerp(lowlandTint, (1.0 - shorelineFactor) * 0.24);
        const rockyTint = new THREE.Color(0.42, 0.39, 0.33);
        tempColorA.lerp(rockyTint, smoothStepRange(0.18, 0.88, elevationFactor) * 0.22);
        colorsArray[vertexIndex * 3 + 0] = tempColorA.r;
        colorsArray[vertexIndex * 3 + 1] = tempColorA.g;
        colorsArray[vertexIndex * 3 + 2] = tempColorA.b;
      }
      terrainGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
      terrainGeometry.computeVertexNormals();
      return terrainGeometry;
    }

    const terrainMaterial = new THREE.MeshStandardMaterial({

        if (currentY > 0) {

          const currentZ = positionsAttribute.getZ(vertexIndex);
          const angleValue = Math.atan2(currentZ, currentX);
          const ridgeNoise = sampleFractalNoise(Math.cos(angleValue) * 3.2 + 5.0, Math.sin(angleValue) * 3.2 + 2.0);
          const silhouetteHeight = 10 + ridgeNoise * 28 + Math.sin(angleValue * 4.0) * 6;
          positionsAttribute.setY(vertexIndex, currentY + silhouetteHeight);
        }
      }
      ridgeGeometry.translate(0, 22, 0);

    function sampleRoadPointByX(targetX, targetVector) {
      let nearestIndex = 0;
      let nearestDistance = Infinity;
      for (let pointIndex = 0; pointIndex < roadSamplePoints.length; pointIndex += 1) {
        const samplePoint = roadSamplePoints[pointIndex];
        const currentDistance = Math.abs(samplePoint.x - targetX);
        if (currentDistance < nearestDistance) {
          nearestDistance = currentDistance;
          nearestIndex = pointIndex;
        }
      }
      targetVector.copy(roadSamplePoints[nearestIndex]);
      return targetVector;
    }

    function sampleCableHeightAtX(worldX) {
      const towerX = sceneMetrics.towerHalfSpanX;
      const anchorageX = sceneMetrics.anchorageHalfSpanX;
      if (Math.abs(worldX) <= towerX) {
        const normalizedX = worldX / towerX;
        return sceneMetrics.cableSagCenter + (sceneMetrics.cableTowerHeight - sceneMetrics.cableSagCenter) * normalizedX * normalizedX;
      }
      const sideDistance = (Math.abs(worldX) - towerX) / (anchorageX - towerX);
      const easedDistance = sideDistance * sideDistance * (3 - 2 * sideDistance);
      return THREE.MathUtils.lerp(sceneMetrics.cableTowerHeight, sceneMetrics.cableAnchorageHeight, easedDistance);
    }

        partGeometry.applyMatrix4(tempMatrixA);

    const skyVertexShader = `

    const skyFragmentShader = `
      varying vec3 vWorldDirection;
      uniform float uTime;
      uniform vec3 uSunDirection;
      uniform vec3 uMoonDirection;
      uniform float uDayFactor;
      uniform float uCloudCoverage;
      uniform float uCloudOpacity;
      uniform float uCloudDarkness;
      uniform float uCloudFloor;
      uniform float uCloudCeil;
      uniform float uHorizonHaze;
      uniform float uSkyCool;
      uniform float uStormFlash;
      uniform float uStorminess;

      float hash21(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 34.45);
        return fract(p.x * p.y);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        float a = hash21(i);
        float b = hash21(i + vec2(1.0, 0.0));
        float c = hash21(i + vec2(0.0, 1.0));
        float d = hash21(i + vec2(1.0, 1.0));
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }

      float fbm(vec2 p) {
        float value = 0.0;
        float amplitude = 0.5;
        float frequency = 1.0;
        for (int octaveIndex = 0; octaveIndex < 5; octaveIndex++) {
          value += noise(p * frequency) * amplitude;
          frequency *= 2.03;
          amplitude *= 0.5;
        }
        return value;
      }

      void main() {
        vec3 direction = normalize(vWorldDirection);
        float horizonAmount = clamp(direction.y * 0.5 + 0.5, 0.0, 1.0);
        float dayAmount = clamp(uDayFactor, 0.0, 1.0);
        float twilightAmount = 1.0 - abs(dayAmount * 2.0 - 1.0);

        vec3 dayZenith = mix(vec3(0.12, 0.39, 0.86), vec3(0.09, 0.22, 0.38), uSkyCool + uStorminess * 0.12);
        vec3 dayHorizon = mix(vec3(0.56, 0.79, 0.99), vec3(0.43, 0.53, 0.62), uSkyCool + uStorminess * 0.2);
        vec3 nightZenith = vec3(0.01, 0.02, 0.06);
        vec3 nightHorizon = vec3(0.05, 0.07, 0.12);
        vec3 skyColor = mix(mix(nightHorizon, nightZenith, pow(horizonAmount, 0.7)), mix(dayHorizon, dayZenith, pow(horizonAmount, 0.65)), dayAmount);

        float sunsetBand = smoothstep(-0.14, 0.18, uSunDirection.y) * smoothstep(0.24, -0.02, uSunDirection.y);
        float sunsetGlow = pow(max(dot(direction, normalize(uSunDirection)), 0.0), 18.0) * sunsetBand;
        skyColor += vec3(1.0, 0.52, 0.22) * sunsetGlow * 0.45;
        skyColor += vec3(1.0, 0.34, 0.1) * twilightAmount * pow(1.0 - abs(direction.y), 4.0) * 0.16;

        vec2 cloudUVLayerA = direction.xz / max(direction.y + 0.34, 0.16);
        vec2 cloudUVLayerB = direction.xz / max(direction.y + 0.54, 0.18);
        cloudUVLayerA += vec2(uTime * 0.003, uTime * 0.0016);
        cloudUVLayerB += vec2(-uTime * 0.0019, uTime * 0.0024);
        float cloudNoiseA = fbm(cloudUVLayerA * 0.82);
        float cloudNoiseB = fbm(cloudUVLayerB * 1.35 + 13.0);
        float cloudField = mix(cloudNoiseA, cloudNoiseB, 0.42);
        float cloudBand = smoothstep(uCloudFloor - 0.1, uCloudFloor + 0.08, direction.y) * (1.0 - smoothstep(uCloudCeil - 0.08, uCloudCeil + 0.12, direction.y));
        float cloudMask = smoothstep(1.0 - uCloudCoverage, 1.0, cloudField) * cloudBand * uCloudOpacity;
        vec3 cloudLitColor = mix(vec3(0.98, 0.98, 1.0), vec3(0.42, 0.46, 0.54), uCloudDarkness + uStorminess * 0.22);
        cloudLitColor += vec3(0.12, 0.09, 0.05) * pow(max(dot(direction, normalize(uSunDirection)), 0.0), 7.0) * twilightAmount;
        skyColor = mix(skyColor, cloudLitColor, cloudMask);

        float sunDisk = smoothstep(0.9991, 0.99985, dot(direction, normalize(uSunDirection)));
        float sunGlow = pow(max(dot(direction, normalize(uSunDirection)), 0.0), 240.0);
        float moonDisk = smoothstep(0.99915, 0.99982, dot(direction, normalize(uMoonDirection)));
        float moonGlow = pow(max(dot(direction, normalize(uMoonDirection)), 0.0), 160.0);

        skyColor += vec3(1.0, 0.93, 0.82) * sunGlow * dayAmount * 0.35;
        skyColor += vec3(1.0, 0.95, 0.84) * sunDisk * dayAmount * 0.7;
        skyColor += vec3(0.62, 0.72, 0.95) * moonGlow * (1.0 - dayAmount) * 0.25;
        skyColor += vec3(0.78, 0.82, 0.93) * moonDisk * (1.0 - dayAmount) * 0.5;

        float horizonMist = pow(1.0 - abs(direction.y), 3.0) * uHorizonHaze;
        skyColor = mix(skyColor, vec3(0.72, 0.76, 0.82), horizonMist * (0.22 + uStorminess * 0.08));
        skyColor += vec3(0.64, 0.7, 0.92) * uStormFlash * (0.25 + cloudMask * 0.75);

        gl_FragColor = vec4(skyColor, 1.0);
      }
    `;

    const skyDomeMaterial = new THREE.ShaderMaterial({

    const waterUniforms = {
      uTime: { value: 0 },
      uWaveStrength: { value: 0.52 },
      uStorminess: { value: 0.0 },
      uRainAmount: { value: 0.0 },
      uDayFactor: { value: 1.0 },
      uNightFactor: { value: 0.0 },
      uFogBank: { value: 0.3 },
      uSkyCool: { value: 0.0 },

      uLightning: { value: 0.0 },
      uCometDirection: { value: new THREE.Vector3(0, 1, 0) },
      uCometIntensity: { value: 0.0 }

    const waterVertexShader = `
      varying vec3 vWorldPosition;
      varying vec3 vObjectPosition;
      uniform float uTime;
      uniform float uWaveStrength;
      uniform float uStorminess;

      float hash21(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 34.45);
        return fract(p.x * p.y);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        float a = hash21(i);
        float b = hash21(i + vec2(1.0, 0.0));
        float c = hash21(i + vec2(0.0, 1.0));
        float d = hash21(i + vec2(1.0, 1.0));
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }

      float waveHeight(vec2 positionXZ) {
        float waveStrength = clamp(uWaveStrength, 0.0, 1.4);
        float amplitudeScale = (0.22 + waveStrength * 1.16 + uStorminess * 0.48) * 0.55;
        float frequencyScale = mix(0.82, 1.94, waveStrength + uStorminess * 0.16);
        float chopScale = mix(0.08, 0.86, waveStrength + uStorminess * 0.2);
        float height = 0.0;
        height += sin((positionXZ.x * 0.046 + positionXZ.y * 0.018) * frequencyScale + uTime * 0.82) * 1.18;
        height += sin((positionXZ.x * -0.026 + positionXZ.y * 0.066) * frequencyScale + uTime * 1.12) * 0.7;
        height += sin((positionXZ.x * 0.014 + positionXZ.y * 0.15) * frequencyScale + uTime * 1.56) * 0.3;
        height += (noise(positionXZ * 0.09 + vec2(uTime * 0.02, -uTime * 0.016)) - 0.5) * 0.84 * chopScale;
        height += (noise(positionXZ * 0.22 + vec2(-uTime * 0.05, uTime * 0.036)) - 0.5) * 0.4 * chopScale;
        return height * amplitudeScale;
      }

      void main() {
        vec3 transformedPosition = position;
        transformedPosition.y += waveHeight(position.xz);
        vec4 worldPosition = modelMatrix * vec4(transformedPosition, 1.0);
        vWorldPosition = worldPosition.xyz;
        vObjectPosition = transformedPosition;
        gl_Position = projectionMatrix * viewMatrix * worldPosition;
      }
    `;

    const waterFragmentShader = `
      varying vec3 vWorldPosition;
      varying vec3 vObjectPosition;
      uniform float uTime;
      uniform float uWaveStrength;
      uniform float uStorminess;
      uniform float uRainAmount;
      uniform float uDayFactor;
      uniform float uNightFactor;
      uniform float uFogBank;
      uniform float uSkyCool;
      uniform vec3 uSunDirection;
      uniform vec3 uMoonDirection;
      uniform float uLightning;
      uniform vec3 uCometDirection;
      uniform float uCometIntensity;

      float hash21(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 34.45);
        return fract(p.x * p.y);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        float a = hash21(i);
        float b = hash21(i + vec2(1.0, 0.0));
        float c = hash21(i + vec2(0.0, 1.0));
        float d = hash21(i + vec2(1.0, 1.0));
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }

      float waveHeight(vec2 positionXZ) {
        float waveStrength = clamp(uWaveStrength, 0.0, 1.4);
        float amplitudeScale = (0.22 + waveStrength * 1.16 + uStorminess * 0.48) * 0.55;
        float frequencyScale = mix(0.82, 1.94, waveStrength + uStorminess * 0.16);
        float chopScale = mix(0.08, 0.86, waveStrength + uStorminess * 0.2);
        float height = 0.0;
        height += sin((positionXZ.x * 0.046 + positionXZ.y * 0.018) * frequencyScale + uTime * 0.82) * 1.18;
        height += sin((positionXZ.x * -0.026 + positionXZ.y * 0.066) * frequencyScale + uTime * 1.12) * 0.7;
        height += sin((positionXZ.x * 0.014 + positionXZ.y * 0.15) * frequencyScale + uTime * 1.56) * 0.3;
        height += (noise(positionXZ * 0.09 + vec2(uTime * 0.02, -uTime * 0.016)) - 0.5) * 0.84 * chopScale;
        height += (noise(positionXZ * 0.22 + vec2(-uTime * 0.05, uTime * 0.036)) - 0.5) * 0.4 * chopScale;
        return height * amplitudeScale;
      }

      vec3 getSkyReflectColor(vec3 reflectionDirection, float dayAmount, float stormAmount) {
        float elevation = clamp(reflectionDirection.y * 0.5 + 0.5, 0.0, 1.0);
        vec3 dayZenith = mix(vec3(0.15, 0.36, 0.66), vec3(0.09, 0.14, 0.18), stormAmount + uSkyCool * 0.3);
        vec3 dayHorizon = mix(vec3(0.42, 0.63, 0.84), vec3(0.24, 0.28, 0.32), stormAmount + uSkyCool * 0.35);
        vec3 nightZenith = vec3(0.02, 0.04, 0.08);
        vec3 nightHorizon = vec3(0.04, 0.07, 0.12);
        return mix(mix(nightHorizon, nightZenith, pow(elevation, 0.6)), mix(dayHorizon, dayZenith, pow(elevation, 0.7)), dayAmount);
      }

      void main() {
        vec2 positionXZ = vObjectPosition.xz;
        float centerHeight = waveHeight(positionXZ);
        float sampleOffset = 0.7;
        float heightOffsetX = waveHeight(positionXZ + vec2(sampleOffset, 0.0));
        float heightOffsetZ = waveHeight(positionXZ + vec2(0.0, sampleOffset));
        vec3 normalDirection = normalize(vec3(centerHeight - heightOffsetX, sampleOffset, centerHeight - heightOffsetZ));
        vec3 viewDirection = normalize(cameraPosition - vWorldPosition);
        vec3 reflectionDirection = reflect(-viewDirection, normalDirection);
        float fresnelAmount = pow(1.0 - max(dot(viewDirection, normalDirection), 0.0), 5.0);
        vec3 deepWaterColor = mix(vec3(0.03, 0.12, 0.18), vec3(0.02, 0.05, 0.08), uNightFactor + uStorminess * 0.3);
        vec3 shallowWaterColor = mix(vec3(0.11, 0.33, 0.41), vec3(0.07, 0.14, 0.18), uStorminess + uNightFactor * 0.4);
        vec3 baseWaterColor = mix(deepWaterColor, shallowWaterColor, 0.32 + uDayFactor * 0.18);
        vec3 reflectionColor = getSkyReflectColor(reflectionDirection, uDayFactor, uStorminess);

        float slopeAmount = length(vec2(heightOffsetX - centerHeight, heightOffsetZ - centerHeight));
        float foamAmount = smoothstep(0.12, 0.78, slopeAmount * (1.0 + uWaveStrength * 3.6 + uStorminess * 2.8));
        foamAmount *= 0.18 + uWaveStrength * 0.86 + uStorminess * 0.26;
        float rainRipple = noise(positionXZ * 0.8 + vec2(uTime * 8.0, -uTime * 6.5));
        foamAmount += rainRipple * uRainAmount * 0.08;

        float sunSpecular = pow(max(dot(reflectionDirection, normalize(uSunDirection)), 0.0), mix(40.0, 120.0, 1.0 - uWaveStrength * 0.45));
        float moonSpecular = pow(max(dot(reflectionDirection, normalize(uMoonDirection)), 0.0), 68.0);
        float cometSpecular = pow(max(dot(reflectionDirection, normalize(uCometDirection)), 0.0), 95.0) * uCometIntensity;
        vec3 colorValue = mix(baseWaterColor, reflectionColor, 0.26 + fresnelAmount * 0.72);
        colorValue += vec3(1.0, 0.88, 0.67) * sunSpecular * uDayFactor * 0.75;
        colorValue += vec3(0.66, 0.72, 0.9) * moonSpecular * (0.2 + uNightFactor * 0.85);
        colorValue += vec3(1.0, 0.78, 0.42) * cometSpecular * 1.2;
        colorValue += vec3(0.66, 0.74, 0.92) * uLightning * 0.32;
        colorValue = mix(colorValue, vec3(0.96, 0.97, 0.98), min(foamAmount, 1.0) * 0.7);

        float bridgeFogMask = exp(-pow(vWorldPosition.z * 0.03, 2.0)) * exp(-pow(vWorldPosition.x * 0.0055, 2.0));
        float fogAmount = uFogBank * bridgeFogMask * 0.6;
        colorValue = mix(colorValue, vec3(0.72, 0.76, 0.81), fogAmount);

        gl_FragColor = vec4(colorValue, 1.0);
      }
    `;

    const waterMaterial = new THREE.ShaderMaterial({
      uniforms: waterUniforms,
      vertexShader: waterVertexShader,
      fragmentShader: waterFragmentShader,
      transparent: false,
      side: THREE.DoubleSide
    });
    const waterGeometry = new THREE.PlaneGeometry(1400, 1400, 250, 250);
    waterGeometry.rotateX(-Math.PI / 2);
    const waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);

    scene.add(waterMesh);

    function buildTreeInstances() {
      const treeCountPerSide = 420;
      const foliageGeometry = new THREE.ConeGeometry(1.0, 3.8, 6);
      const trunkGeometry = new THREE.CylinderGeometry(0.16, 0.22, 1.2, 6);
      const foliageMaterial = new THREE.MeshStandardMaterial({ color: 0x425438, roughness: 0.94 });
      const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x5f4631, roughness: 1.0 });
      const foliageMesh = new THREE.InstancedMesh(foliageGeometry, foliageMaterial, treeCountPerSide * 2);
      const trunkMesh = new THREE.InstancedMesh(trunkGeometry, trunkMaterial, treeCountPerSide * 2);
      foliageMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      trunkMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      let instanceIndex = 0;

      function placeTree(sideKey) {
        const xRange = sideKey === 'left' ? [-370, -110] : [110, 370];
        for (let treeIndex = 0; treeIndex < treeCountPerSide; treeIndex += 1) {
          let attempts = 0;
          let isPlaced = false;
          while (!isPlaced && attempts < 24) {
            attempts += 1;
            const xValue = THREE.MathUtils.lerp(xRange[0], xRange[1], Math.random());
            const zValue = THREE.MathUtils.lerp(-320, 320, Math.random());
            const yValue = sampleTerrainHeight(xValue, zValue);
            const heightSampleX = sampleTerrainHeight(xValue + 1.0, zValue);
            const heightSampleZ = sampleTerrainHeight(xValue, zValue + 1.0);
            const slopeValue = Math.abs(heightSampleX - yValue) + Math.abs(heightSampleZ - yValue);
            const coastLimit = sideKey === 'left' ? leftCoastlineX(zValue) - 12 : rightCoastlineX(zValue) + 12;
            const roadDistance = Math.abs(zValue) + Math.abs(xValue) * 0.02;
            const clearOfRoad = roadDistance > 28;
            const insideLand = sideKey === 'left' ? xValue < coastLimit : xValue > coastLimit;
            if (insideLand && clearOfRoad && yValue > 2.0 && yValue < 58 && slopeValue < 3.4) {
              const treeScale = 0.9 + Math.random() * 1.8;
              tempMatrixA.compose(
                tempVectorA.set(xValue, yValue + 2.0 * treeScale, zValue),
                tempQuaternionA.setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.random() * Math.PI * 2),
                tempVectorB.set(1.2 * treeScale, 1.0 * treeScale, 1.2 * treeScale)
              );
              foliageMesh.setMatrixAt(instanceIndex, tempMatrixA);
              tempColorA.setRGB(0.18 + Math.random() * 0.09, 0.28 + Math.random() * 0.1, 0.16 + Math.random() * 0.06);
              tempColorA.lerp(new THREE.Color(0.46, 0.42, 0.21), smoothStepRange(18, 54, yValue) * 0.4);
              foliageMesh.setColorAt(instanceIndex, tempColorA);

              tempMatrixB.compose(
                tempVectorC.set(xValue, yValue + 0.6 * treeScale, zValue),
                tempQuaternionA,
                tempVectorD.set(0.9 * treeScale, 1.0 * treeScale, 0.9 * treeScale)
              );
              trunkMesh.setMatrixAt(instanceIndex, tempMatrixB);
              instanceIndex += 1;
              isPlaced = true;
            }
          }
        }
      }

      placeTree('left');
      placeTree('right');
      foliageMesh.count = instanceIndex;
      trunkMesh.count = instanceIndex;
      foliageMesh.castShadow = true;
      trunkMesh.castShadow = true;
      foliageMesh.receiveShadow = true;
      trunkMesh.receiveShadow = true;
      return { foliageMesh, trunkMesh };
    }

    const treeInstances = buildTreeInstances();

          whaleRecord.centerZ = centerBaseZ + THREE.MathUtils.lerp(-22, 22, Math.random());
          whaleRecord.routeRadiusX = 10 + Math.random() * 16;
          whaleRecord.routeRadiusZ = 8 + Math.random() * 20;
          whaleRecord.orbitPhase = Math.random() * Math.PI * 2;
          whaleRecord.surfacingOffset = Math.random() * Math.PI * 2;
          whaleRecord.breachMode = Math.floor(Math.random() * 3);
          whaleRecord.lastStage = -1;
          whaleRecord.speed = 0.035 + Math.random() * 0.028;
        } else {
          whaleRecord.group.visible = false;
          whaleRecord.lastStage = -1;
        }
      }
      updateReadout();
    }

    whalesButtonElement.addEventListener('click', () => {
      buildWhaleRouteSpawn();
    });

    cometButtonElement.addEventListener('click', () => {
      if (currentLightingState.nightFactor > 0.18 && !cometState.active) {
        cometState.active = true;
        cometState.progress = 0;
        cometGroup.visible = true;
        cometReflectionSprite.visible = true;
      }
    });

    const sunLight = new THREE.DirectionalLight(0xfff2d8, 2.1);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.near = 20;
    sunLight.shadow.camera.far = 420;
    sunLight.shadow.camera.left = -180;
    sunLight.shadow.camera.right = 180;
    sunLight.shadow.camera.top = 160;
    sunLight.shadow.camera.bottom = -160;
    scene.add(sunLight);
    scene.add(sunLight.target);

    const moonLight = new THREE.DirectionalLight(0xcad6ff, 0.3);
    scene.add(moonLight);
    scene.add(moonLight.target);

    const hemisphereLight = new THREE.HemisphereLight(0xd6ecff, 0x27343b, 0.62);
    scene.add(hemisphereLight);

    const ambientLight = new THREE.AmbientLight(0xc6d2de, 0.22);
    scene.add(ambientLight);

    const lightningLight = new THREE.PointLight(0xdbe6ff, 0, 380, 1.3);
    lightningLight.position.set(0, 120, 0);
    scene.add(lightningLight);

    let lightningPulse = 0;
    let lightningCooldown = 0;

    function getTimeLabel(timePercent) {
      if (timePercent < 10) return 'Morning';
      if (timePercent < 24) return 'Late morning';
      if (timePercent < 44) return 'Midday';
      if (timePercent < 62) return 'Afternoon';
      if (timePercent < 78) return 'Golden hour';
      if (timePercent < 88) return 'Sunset';
      return 'Night';
    }

    function updateReadout() {
      fogValueElement.textContent = `${environmentState.fogPercent}%`;
      trafficValueElement.textContent = `${environmentState.trafficPercent}%`;
      waveValueElement.textContent = `${environmentState.wavePercent}%`;
      weatherValueElement.textContent = weatherProfiles[environmentState.weatherKey].label;
      timeValueElement.textContent = currentLightingState.timeLabel;

      readoutFogElement.textContent = `${environmentState.fogPercent}%`;
      readoutTrafficElement.textContent = `${environmentState.trafficPercent}%`;
      readoutWavesElement.textContent = `${environmentState.wavePercent}%`;
      readoutWhalesElement.textContent = `${environmentState.whalesCount}`;
      readoutTimeElement.textContent = currentLightingState.timeLabel;
      readoutWeatherElement.textContent = weatherProfiles[environmentState.weatherKey].label;
    }

    function bindUI() {
      fogSliderElement.addEventListener('input', () => {
        environmentState.fogPercent = Number(fogSliderElement.value);
        updateReadout();
      });
      trafficSliderElement.addEventListener('input', () => {
        environmentState.trafficPercent = Number(trafficSliderElement.value);
        updateReadout();
      });
      waveSliderElement.addEventListener('input', () => {
        environmentState.wavePercent = Number(waveSliderElement.value);
        updateReadout();
      });
      weatherSelectElement.addEventListener('input', () => {
        environmentState.weatherKey = weatherSelectElement.value;
        updateReadout();
      });
      timeSliderElement.addEventListener('input', () => {
        environmentState.timePercent = Number(timeSliderElement.value);
        currentLightingState.timeLabel = getTimeLabel(environmentState.timePercent);
        updateReadout();
      });
    }

    bindUI();

    function updateEnvironmentTargets(elapsedSeconds) {
      const weatherProfile = weatherProfiles[environmentState.weatherKey];
      const timeNormalized = environmentState.timePercent / 100;
      currentLightingState.timeLabel = getTimeLabel(environmentState.timePercent);

      const sunElevation = timeNormalized < 0.55
        ? THREE.MathUtils.lerp(0.1, 0.86, smoothStepRange(0.0, 0.55, timeNormalized))
        : timeNormalized < 0.82
          ? THREE.MathUtils.lerp(0.86, 0.04, smoothStepRange(0.55, 0.82, timeNormalized))
          : THREE.MathUtils.lerp(0.04, -0.46, smoothStepRange(0.82, 1.0, timeNormalized));
      const sunAzimuth = THREE.MathUtils.lerp(-1.02, 0.86, timeNormalized);
      currentLightingState.sunDirection.set(
        Math.cos(sunAzimuth) * Math.sqrt(Math.max(0.0, 1.0 - sunElevation * sunElevation)),
        sunElevation,
        Math.sin(sunAzimuth) * Math.sqrt(Math.max(0.0, 1.0 - sunElevation * sunElevation))
      ).normalize();
      currentLightingState.moonDirection.copy(currentLightingState.sunDirection).multiplyScalar(-1);
      currentLightingState.dayFactor = smoothStepRange(-0.08, 0.12, currentLightingState.sunDirection.y);
      currentLightingState.nightFactor = smoothStepRange(0.05, -0.24, currentLightingState.sunDirection.y);
      currentLightingState.twilightFactor = 1.0 - Math.abs(currentLightingState.dayFactor - currentLightingState.nightFactor);
      currentLightingState.fogDensity = THREE.MathUtils.clamp(weatherProfile.fogBias + environmentState.fogPercent / 100, 0, 1.25);
      currentLightingState.rainAmount = weatherProfile.rainAmount;
      currentLightingState.storminess = weatherProfile.storminess;
      currentLightingState.waveStrength = THREE.MathUtils.clamp(environmentState.wavePercent / 100 + weatherProfile.waveBias, 0, 1.3);
      currentLightingState.wetness = THREE.MathUtils.clamp(weatherProfile.wetness + currentLightingState.rainAmount * 0.2, 0, 1.0);

      sunLight.position.copy(currentLightingState.sunDirection).multiplyScalar(260);
      sunLight.target.position.set(0, 18, 0);
      sunLight.intensity = weatherProfile.sunStrength * (0.1 + currentLightingState.dayFactor * 1.4 + currentLightingState.twilightFactor * 0.2);
      sunLight.color.setRGB(
        1.0,
        THREE.MathUtils.lerp(0.72, 0.95, currentLightingState.dayFactor),
        THREE.MathUtils.lerp(0.54, 0.88, currentLightingState.dayFactor)
      );
      sunLight.shadow.radius = 2 + weatherProfile.shadowSoftness * 10;

      moonLight.position.copy(currentLightingState.moonDirection).multiplyScalar(240);
      moonLight.target.position.set(0, 10, 0);
      moonLight.intensity = weatherProfile.moonStrength * (0.08 + currentLightingState.nightFactor * 1.25);

      hemisphereLight.intensity = weatherProfile.ambientStrength * (0.35 + currentLightingState.dayFactor * 0.72 + currentLightingState.twilightFactor * 0.16);
      hemisphereLight.color.setRGB(
        THREE.MathUtils.lerp(0.5, 0.84, currentLightingState.dayFactor),
        THREE.MathUtils.lerp(0.56, 0.9, currentLightingState.dayFactor),
        THREE.MathUtils.lerp(0.64, 1.0, currentLightingState.dayFactor)
      );
      hemisphereLight.groundColor.setRGB(0.18, 0.2, 0.22);

      ambientLight.intensity = 0.12 + weatherProfile.ambientStrength * 0.18 + currentLightingState.nightFactor * 0.08;

      skyUniforms.uTime.value = elapsedSeconds;
      skyUniforms.uSunDirection.value.copy(currentLightingState.sunDirection);
      skyUniforms.uMoonDirection.value.copy(currentLightingState.moonDirection);
      skyUniforms.uDayFactor.value = currentLightingState.dayFactor;
      skyUniforms.uCloudCoverage.value = weatherProfile.cloudCoverage;
      skyUniforms.uCloudOpacity.value = weatherProfile.cloudOpacity;
      skyUniforms.uCloudDarkness.value = weatherProfile.cloudDarkness;
      skyUniforms.uCloudFloor.value = weatherProfile.cloudFloor;
      skyUniforms.uCloudCeil.value = weatherProfile.cloudCeil;
      skyUniforms.uHorizonHaze.value = weatherProfile.horizonHaze + currentLightingState.fogDensity * 0.12;
      skyUniforms.uSkyCool.value = weatherProfile.skyCool;
      skyUniforms.uStorminess.value = weatherProfile.storminess;

      sunMesh.position.copy(currentLightingState.sunDirection).multiplyScalar(710);
      sunMesh.material.opacity = currentLightingState.dayFactor > 0.05 ? THREE.MathUtils.lerp(0, 0.92, currentLightingState.dayFactor) : 0;
      moonMesh.position.copy(currentLightingState.moonDirection).multiplyScalar(700);
      moonMesh.material.opacity = THREE.MathUtils.lerp(0, 0.86, currentLightingState.nightFactor);
      starsMaterial.opacity = THREE.MathUtils.smoothstep(currentLightingState.nightFactor, 0.08, 0.86) * 0.92;

      waterUniforms.uTime.value = elapsedSeconds;
      waterUniforms.uWaveStrength.value = currentLightingState.waveStrength;
      waterUniforms.uStorminess.value = currentLightingState.storminess;
      waterUniforms.uRainAmount.value = currentLightingState.rainAmount;
      waterUniforms.uDayFactor.value = currentLightingState.dayFactor;
      waterUniforms.uNightFactor.value = currentLightingState.nightFactor;
      waterUniforms.uFogBank.value = currentLightingState.fogDensity;
      waterUniforms.uSkyCool.value = weatherProfile.skyCool;
      waterUniforms.uSunDirection.value.copy(currentLightingState.sunDirection);
      waterUniforms.uMoonDirection.value.copy(currentLightingState.moonDirection);
      waterUniforms.uLightning.value = lightningPulse;

      renderer.toneMappingExposure = THREE.MathUtils.lerp(0.76, 1.08, currentLightingState.dayFactor) + currentLightingState.twilightFactor * 0.12 + lightningPulse * 0.1;

      roadMaterial.roughness = THREE.MathUtils.lerp(0.88, 0.22, currentLightingState.wetness);
      roadMaterial.clearcoat = THREE.MathUtils.lerp(0.08, 0.92, currentLightingState.wetness);
      roadMaterial.clearcoatRoughness = THREE.MathUtils.lerp(0.9, 0.18, currentLightingState.wetness);
      bridgeOrangeMaterial.roughness = THREE.MathUtils.lerp(0.64, 0.26, currentLightingState.wetness * 0.62);
      bridgeOrangeMaterial.clearcoat = THREE.MathUtils.lerp(0.18, 0.78, currentLightingState.wetness * 0.8);
      bridgeOrangeMaterial.clearcoatRoughness = THREE.MathUtils.lerp(0.58, 0.24, currentLightingState.wetness * 0.8);

      puddleGroup.visible = currentLightingState.wetness > 0.4;
      deckLampMaterial.opacity = THREE.MathUtils.clamp(currentLightingState.nightFactor * 0.92 + currentLightingState.twilightFactor * 0.08, 0, 0.95);
      skyline.buildingMaterial.emissiveIntensity = 0.18 + currentLightingState.nightFactor * 1.1;
      alcatraz.prisonMaterial.emissiveIntensity = currentLightingState.nightFactor * 0.58;
      alcatraz.beaconMesh.material.opacity = currentLightingState.nightFactor * 0.8;

      headlightMaterial.opacity = THREE.MathUtils.clamp(currentLightingState.nightFactor * 0.92 + currentLightingState.twilightFactor * 0.1, 0.02, 0.95);
      taillightMaterial.opacity = THREE.MathUtils.clamp(currentLightingState.nightFactor * 0.96 + currentLightingState.twilightFactor * 0.12, 0.05, 0.98);

      cometButtonElement.disabled = currentLightingState.nightFactor < 0.18 || cometState.active;
      cometButtonElement.title = currentLightingState.nightFactor < 0.18 ? 'Available at night' : (cometState.active ? 'Comet in flight' : 'Send a comet over the bridge');
      readoutTimeElement.textContent = currentLightingState.timeLabel;
      timeValueElement.textContent = currentLightingState.timeLabel;
    }

    function updateLightning(elapsedSeconds, deltaSeconds) {
      if (environmentState.weatherKey === 'stormy') {
        lightningCooldown -= deltaSeconds;
        if (lightningCooldown <= 0 && Math.random() < 0.035) {
          lightningPulse = 1.0;
          lightningCooldown = 2.2 + Math.random() * 4.5;
          lightningLight.position.set(
            THREE.MathUtils.lerp(-140, 140, Math.random()),
            110 + Math.random() * 40,
            THREE.MathUtils.lerp(-180, 180, Math.random())
          );
        }
      }
      lightningPulse = Math.max(0, lightningPulse - deltaSeconds * 2.8);
      skyUniforms.uStormFlash.value = lightningPulse;
      lightningLight.intensity = lightningPulse * 4.6;
      waterUniforms.uLightning.value = lightningPulse;
    }

    function updateFogBank(elapsedSeconds) {
      fogBankGroup.visible = currentLightingState.fogDensity > 0.02;
      const profile = weatherProfiles[environmentState.weatherKey];
      for (let fogIndex = 0; fogIndex < fogSprites.length; fogIndex += 1) {
        const fogRecord = fogSprites[fogIndex];
        const driftPhase = elapsedSeconds * 0.04 * fogRecord.drift + fogRecord.phase;
        const bridgeCenterFactor = Math.exp(-Math.pow(fogRecord.baseZ * 0.03, 2));
        const fogLift = Math.sin(driftPhase) * 1.6 + Math.cos(driftPhase * 0.7) * 0.8;
        fogRecord.sprite.position.set(
          fogRecord.baseX + Math.sin(driftPhase * 0.9) * 8.0,
          fogRecord.baseY + fogLift + currentLightingState.fogDensity * 3.8,
          fogRecord.baseZ + Math.cos(driftPhase) * 4.0
        );
        const alphaValue = THREE.MathUtils.clamp((0.05 + currentLightingState.fogDensity * 0.4 + profile.fogBias * 0.18) * bridgeCenterFactor, 0, 0.62);
        fogRecord.sprite.material.opacity = alphaValue;
        const scaleMultiplier = 1.0 + currentLightingState.fogDensity * 0.85;
        fogRecord.sprite.scale.set(fogRecord.scale * scaleMultiplier, fogRecord.scale * 0.58 * scaleMultiplier, 1);
      }
    }

    const routeForwardVector = new THREE.Vector3(1, 0, 0);

    function updateTraffic(elapsedSeconds) {
      const densityNormalized = environmentState.trafficPercent / 100;
      const weatherProfile = weatherProfiles[environmentState.weatherKey];
      for (let archetypeIndex = 0; archetypeIndex < vehicleMeshes.length; archetypeIndex += 1) {
        vehicleMeshes[archetypeIndex].material.roughness = THREE.MathUtils.lerp(0.54, 0.28, currentLightingState.wetness * 0.5);
      }
      let lightInstanceCursor = 0;
      for (let laneIndex = 0; laneIndex < laneDefinitions.length; laneIndex += 1) {
        const laneDefinition = laneDefinitions[laneIndex];
        const laneSlots = trafficSlots[laneIndex];
        const activeCount = Math.round(maxSlotsPerLane * densityNormalized);
        for (let slotIndex = 0; slotIndex < laneSlots.length; slotIndex += 1) {
          const slotRecord = laneSlots[slotIndex];
          const archetypeRecord = vehicleArchetypes[slotRecord.archetypeIndex];
          const targetVehicleMesh = vehicleMeshes[slotRecord.archetypeIndex];
          if (slotIndex < activeCount && activeCount > 0) {
            const spacingFactor = slotIndex / activeCount;
            const motionProgress = THREE.MathUtils.euclideanModulo(
              spacingFactor + slotRecord.localPhase / activeCount + elapsedSeconds * laneDefinition.baseSpeed * slotRecord.speedOffset * laneDefinition.travelDirection * weatherProfile.trafficSlowdown,
              1.0
            );
            sampleRoadPointAtParameter(motionProgress, tempVectorA);
            sampleRoadTangentAtParameter(motionProgress, tempVectorB).normalize();
            if (laneDefinition.travelDirection < 0) {
              tempVectorB.negate();
            }
            tempQuaternionA.setFromUnitVectors(routeForwardVector, tempVectorB);
            tempVectorA.z += laneDefinition.laneOffsetZ;
            tempMatrixA.compose(tempVectorA, tempQuaternionA, tempVectorC.set(1, 1, 1));
            targetVehicleMesh.setMatrixAt(slotRecord.instanceIndex, tempMatrixA);

            const lightXOffset = archetypeRecord.length * 0.48;
            const lightZOffset = archetypeRecord.width * 0.33;
            const lightYOffset = 0.18;

            tempVectorE.set(lightXOffset, lightYOffset, lightZOffset).applyQuaternion(tempQuaternionA).add(tempVectorA);
            tempMatrixB.compose(tempVectorE, tempQuaternionA, tempVectorF.set(1.2, 1.0, 0.9));
            headlightMesh.setMatrixAt(lightInstanceCursor, tempMatrixB);
            lightInstanceCursor += 1;

            tempVectorE.set(lightXOffset, lightYOffset, -lightZOffset).applyQuaternion(tempQuaternionA).add(tempVectorA);
            tempMatrixB.compose(tempVectorE, tempQuaternionA, tempVectorF.set(1.2, 1.0, 0.9));
            headlightMesh.setMatrixAt(lightInstanceCursor, tempMatrixB);
            lightInstanceCursor += 1;

            tempVectorE.set(-lightXOffset, lightYOffset, lightZOffset).applyQuaternion(tempQuaternionA).add(tempVectorA);
            tempMatrixB.compose(tempVectorE, tempQuaternionA, tempVectorF.set(0.9, 1.0, 0.9));
            taillightMesh.setMatrixAt(lightInstanceCursor - 2, tempMatrixB);

            tempVectorE.set(-lightXOffset, lightYOffset, -lightZOffset).applyQuaternion(tempQuaternionA).add(tempVectorA);
            tempMatrixB.compose(tempVectorE, tempQuaternionA, tempVectorF.set(0.9, 1.0, 0.9));
            taillightMesh.setMatrixAt(lightInstanceCursor - 1, tempMatrixB);
          } else {
            tempMatrixA.makeScale(0.0001, 0.0001, 0.0001);
            targetVehicleMesh.setMatrixAt(slotRecord.instanceIndex, tempMatrixA);
            headlightMesh.setMatrixAt(lightInstanceCursor, tempMatrixA);
            headlightMesh.setMatrixAt(lightInstanceCursor + 1, tempMatrixA);
            taillightMesh.setMatrixAt(lightInstanceCursor, tempMatrixA);
            taillightMesh.setMatrixAt(lightInstanceCursor + 1, tempMatrixA);
            lightInstanceCursor += 2;
          }
        }
      }
      for (let archetypeIndex = 0; archetypeIndex < vehicleMeshes.length; archetypeIndex += 1) {
        vehicleMeshes[archetypeIndex].instanceMatrix.needsUpdate = true;
      }
      headlightMesh.instanceMatrix.needsUpdate = true;
      taillightMesh.instanceMatrix.needsUpdate = true;
    }

    function updateBirds(elapsedSeconds) {
      for (let birdIndex = 0; birdIndex < birds.length; birdIndex += 1) {
        const birdRecord = birds[birdIndex];
        const orbitAngle = elapsedSeconds * birdRecord.speed + birdRecord.orbitPhase;
        const flapAmount = Math.sin(elapsedSeconds * 8.0 + birdRecord.orbitPhase) * 0.55;
        const birdX = birdRecord.centerX + Math.cos(orbitAngle) * birdRecord.radius;
        const birdY = birdRecord.altitude + Math.sin(orbitAngle * 2.0) * 2.0;
        const birdZ = birdRecord.centerZ + Math.sin(orbitAngle) * birdRecord.radius * 0.7;
        birdRecord.birdGroup.position.set(birdX, birdY, birdZ);
        birdRecord.birdGroup.lookAt(birdX + Math.sin(orbitAngle + 0.3) * 4, birdY + 0.5, birdZ + Math.cos(orbitAngle + 0.3) * 4);
        birdRecord.leftWingMesh.rotation.z = -0.4 + flapAmount * 0.35;
        birdRecord.rightWingMesh.rotation.z = 0.4 - flapAmount * 0.35;
        birdRecord.birdGroup.scale.setScalar(0.8 + birdIndex * 0.02);
      }
    }

    function updateVessels(elapsedSeconds) {
      for (let vesselIndex = 0; vesselIndex < vessels.length; vesselIndex += 1) {
        const vesselRecord = vessels[vesselIndex];
        const routeProgress = THREE.MathUtils.euclideanModulo(vesselRecord.offset + elapsedSeconds * vesselRecord.speed, 1.0);
        const vesselPoint = vesselRecord.curve.getPointAt(routeProgress);
        const vesselTangent = vesselRecord.curve.getTangentAt(routeProgress).normalize();
        const vesselWaterHeight = sampleWaterHeight(vesselPoint.x, vesselPoint.z, elapsedSeconds);
        vesselRecord.vesselGroup.position.set(vesselPoint.x, vesselWaterHeight + 0.2 + Math.sin(elapsedSeconds * 1.2 + vesselIndex) * vesselRecord.bob * 0.18, vesselPoint.z);
        tempQuaternionA.setFromUnitVectors(new THREE.Vector3(1, 0, 0), vesselTangent);
        vesselRecord.vesselGroup.quaternion.copy(tempQuaternionA);
        vesselRecord.vesselGroup.rotation.z += Math.sin(elapsedSeconds * 1.6 + vesselIndex * 1.4) * 0.02;
        vesselRecord.wakeMesh.material.opacity = 0.14 + currentLightingState.waveStrength * 0.16 + currentLightingState.nightFactor * 0.04;
        vesselRecord.navLightMesh.material.opacity = currentLightingState.nightFactor * 0.9;
      }
    }

    function updateRain(elapsedSeconds) {
      const weatherProfile = weatherProfiles[environmentState.weatherKey];
      rainLines.visible = currentLightingState.rainAmount > 0.02;
      rainMaterial.opacity = currentLightingState.rainAmount * 0.45;
      if (!rainLines.visible) {
        return;
      }
      const baseCenterX = camera.position.x * 0.35 + controls.target.x * 0.65;
      const baseCenterZ = camera.position.z * 0.35 + controls.target.z * 0.65;
      const windX = -0.6 - weatherProfile.storminess * 0.65;
      const windZ = -0.18 - weatherProfile.storminess * 0.18;
      for (let rainIndex = 0; rainIndex < rainDropCount; rainIndex += 1) {
        const seedIndex = rainIndex * 4;
        const seedX = rainSeeds[seedIndex + 0];
        const seedZ = rainSeeds[seedIndex + 1];
        const seedOffset = rainSeeds[seedIndex + 2];
        const rainLength = rainSeeds[seedIndex + 3];
        const dropX = baseCenterX + (seedX - 0.5) * 180 + windX * elapsedSeconds * 6.0;
        const dropZ = baseCenterZ + (seedZ - 0.5) * 180 + windZ * elapsedSeconds * 6.0;
        const dropY = 112 - THREE.MathUtils.euclideanModulo(elapsedSeconds * (38 + weatherProfile.storminess * 18) + seedOffset, 112);
        const startIndex = rainIndex * 6;
        rainPositions[startIndex + 0] = dropX;
        rainPositions[startIndex + 1] = dropY;
        rainPositions[startIndex + 2] = dropZ;
        rainPositions[startIndex + 3] = dropX + windX * rainLength;
        rainPositions[startIndex + 4] = dropY - rainLength * 4.2;
        rainPositions[startIndex + 5] = dropZ + windZ * rainLength;
      }
      rainGeometry.attributes.position.needsUpdate = true;
    }

    function updateWhales(elapsedSeconds, deltaSeconds) {
      for (let whaleIndex = 0; whaleIndex < whaleGroups.length; whaleIndex += 1) {
        const whaleRecord = whaleGroups[whaleIndex];
        if (!whaleRecord.group.visible) {
          continue;
        }
        const orbitAngle = elapsedSeconds * whaleRecord.speed + whaleRecord.orbitPhase;
        const whaleX = whaleRecord.centerX + Math.cos(orbitAngle) * whaleRecord.routeRadiusX;
        const whaleZ = whaleRecord.centerZ + Math.sin(orbitAngle * 0.92) * whaleRecord.routeRadiusZ;
        const waterHeight = sampleWaterHeight(whaleX, whaleZ, elapsedSeconds);
        const behaviorPhase = THREE.MathUtils.euclideanModulo(elapsedSeconds * 0.11 + whaleRecord.surfacingOffset, 1.0);
        let stageIndex = 0;
        if (behaviorPhase < 0.46) {
          stageIndex = 0;
        } else if (behaviorPhase < 0.68) {
          stageIndex = 1;
        } else if (behaviorPhase < 0.86) {
          stageIndex = 2;
        } else {
          stageIndex = 3;
        }
        if (stageIndex !== whaleRecord.lastStage) {
          if (stageIndex === 1 || stageIndex === 2) {
            emitRipple(whaleX, whaleZ, 0.5 + whaleRecord.breachMode * 0.16);
            emitSplash(whaleX, waterHeight + 0.6, whaleZ, 0.6 + whaleRecord.breachMode * 0.18);
          }
          whaleRecord.lastStage = stageIndex;
        }

        const headingTargetX = whaleRecord.centerX + Math.cos(orbitAngle + 0.08) * whaleRecord.routeRadiusX;
        const headingTargetZ = whaleRecord.centerZ + Math.sin((orbitAngle + 0.08) * 0.92) * whaleRecord.routeRadiusZ;
        whaleRecord.group.position.set(whaleX, waterHeight - 1.2, whaleZ);
        whaleRecord.group.lookAt(headingTargetX, waterHeight, headingTargetZ);
        whaleRecord.group.rotation.z = Math.sin(elapsedSeconds * 2.4 + whaleIndex) * 0.05;

        if (stageIndex === 0) {
          whaleRecord.group.position.y = waterHeight - 1.25 + Math.sin(elapsedSeconds * 3.0 + whaleIndex) * 0.12;
          whaleRecord.group.rotation.z += Math.sin(elapsedSeconds * 4.4 + whaleIndex) * 0.08;
        } else if (stageIndex === 1) {
          whaleRecord.group.position.y = waterHeight - 0.16 + Math.sin(behaviorPhase * Math.PI * 6.0) * 0.24;
          whaleRecord.group.rotation.z += Math.sin(elapsedSeconds * 6.0 + whaleIndex) * 0.1;
        } else if (stageIndex === 2) {
          const surge = smoothStepRange(0.68, 0.86, behaviorPhase);
          whaleRecord.group.position.y = waterHeight + 0.4 + surge * (2.4 + whaleRecord.breachMode * 0.8);
          whaleRecord.group.rotation.z += THREE.MathUtils.lerp(0.0, 0.4 + whaleRecord.breachMode * 0.18, surge);
          whaleRecord.group.rotation.x += THREE.MathUtils.lerp(0.0, whaleRecord.breachMode === 1 ? -0.5 : 0.2, surge);
        } else {
          const descent = smoothStepRange(0.86, 1.0, behaviorPhase);
          whaleRecord.group.position.y = THREE.MathUtils.lerp(waterHeight + 2.0, waterHeight - 1.2, descent);
          whaleRecord.group.rotation.z += THREE.MathUtils.lerp(0.4, -0.2, descent);
          whaleRecord.group.rotation.x += THREE.MathUtils.lerp(0.2, -0.3, descent);
        }
      }

      for (let rippleIndex = 0; rippleIndex < ripplePool.length; rippleIndex += 1) {
        const rippleRecord = ripplePool[rippleIndex];
        if (!rippleRecord.active) {
          continue;
        }
        rippleRecord.age += deltaSeconds;
        rippleRecord.mesh.scale.setScalar(1.0 + rippleRecord.age * rippleRecord.growth);
        rippleRecord.mesh.material.opacity = Math.max(0, 0.46 - rippleRecord.age * rippleRecord.speed * 0.2);
        if (rippleRecord.age > 2.4) {
          rippleRecord.active = false;
          rippleRecord.mesh.visible = false;
        }
      }

      for (let splashIndex = 0; splashIndex < splashPool.length; splashIndex += 1) {
        const splashRecord = splashPool[splashIndex];
        if (!splashRecord.active) {
          continue;
        }
        splashRecord.age += deltaSeconds;
        splashRecord.velocity.y -= deltaSeconds * 7.6;
        splashRecord.sprite.position.addScaledVector(splashRecord.velocity, deltaSeconds);
        const lifeProgress = splashRecord.age / splashRecord.life;
        splashRecord.sprite.material.opacity = Math.max(0, 0.72 * (1 - lifeProgress));
        splashRecord.sprite.scale.setScalar(splashRecord.baseScale * (1.0 + lifeProgress * 1.8));
        if (splashRecord.age >= splashRecord.life) {
          splashRecord.active = false;
          splashRecord.sprite.visible = false;
        }
      }
    }

    function updateComet(elapsedSeconds, deltaSeconds) {
      if (!cometState.active) {
        waterUniforms.uCometIntensity.value = 0.0;
        cometGroup.visible = false;
        cometReflectionSprite.visible = false;
        return;
      }
      cometState.progress += deltaSeconds * cometState.speed;
      if (cometState.progress >= 1.0) {
        cometState.active = false;
        cometGroup.visible = false;
        cometReflectionSprite.visible = false;
        waterUniforms.uCometIntensity.value = 0.0;
        cometButtonElement.disabled = currentLightingState.nightFactor < 0.18;
        return;
      }
      tempVectorA.lerpVectors(cometState.start, cometState.end, cometState.progress);
      tempVectorB.copy(cometState.end).sub(cometState.start).normalize();
      cometState.direction.copy(tempVectorB);
      cometGroup.position.copy(tempVectorA);
      cometGroup.quaternion.setFromUnitVectors(new THREE.Vector3(0, -1, 0), tempVectorB);
      const intensityValue = Math.sin(cometState.progress * Math.PI);
      cometHeadMesh.material.opacity = 0.45 + intensityValue * 0.55;
      cometHeadMesh.scale.setScalar(0.8 + intensityValue * 1.4);
      for (let planeIndex = 0; planeIndex < cometTailPlanes.length; planeIndex += 1) {
        cometTailPlanes[planeIndex].material.opacity = 0.18 + intensityValue * 0.36;
      }
      waterUniforms.uCometDirection.value.copy(tempVectorB);
      waterUniforms.uCometIntensity.value = intensityValue;
      lightningLight.intensity += intensityValue * 0.6;

      const reflectionY = sampleWaterHeight(tempVectorA.x * 0.22, 96, elapsedSeconds);
      cometReflectionSprite.position.set(tempVectorA.x * 0.32, reflectionY + 0.14, tempVectorA.z * 0.28);
      cometReflectionSprite.material.opacity = intensityValue * 0.48;
      cometReflectionSprite.scale.set(18 + intensityValue * 26, 4 + intensityValue * 8, 1);
      cometReflectionSprite.visible = true;
    }

    function updateSkyAnchors() {
      skyGroup.position.copy(camera.position);
      distantRidgeMesh.position.copy(camera.position).setY(22);
    }

    function updateDeckLamps() {
      deckLampMaterial.opacity = THREE.MathUtils.clamp(currentLightingState.nightFactor * 0.92 + currentLightingState.twilightFactor * 0.14, 0, 0.95);
    }

    function animate() {
      requestAnimationFrame(animate);
      const deltaSeconds = Math.min(clock.getDelta(), 0.033);
      const elapsedSeconds = clock.getElapsedTime();
      controls.update();
      updateEnvironmentTargets(elapsedSeconds);
      updateLightning(elapsedSeconds, deltaSeconds);
      updateFogBank(elapsedSeconds);
      updateTraffic(elapsedSeconds);
      updateBirds(elapsedSeconds);
      updateVessels(elapsedSeconds);
      updateRain(elapsedSeconds);
      updateWhales(elapsedSeconds, deltaSeconds);
      updateComet(elapsedSeconds, deltaSeconds);
      updateSkyAnchors();
      updateDeckLamps();
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }

    window.addEventListener('resize', onWindowResize);

    buildWhaleRouteSpawn();
    currentLightingState.timeLabel = getTimeLabel(environmentState.timePercent);
    updateReadout();
    animate();
  </script>
</body>
</html>
